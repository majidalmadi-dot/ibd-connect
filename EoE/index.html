<style>
:root{

*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{margin:0;background:var(--bg);color:var(--txt);
  font-family:'Inter','Segoe UI',system-ui,Arial,sans-serif;letter-spacing:-.01em;overflow:hidden}

.screen.active{display:flex}

.spacer{flex:1}

.card{background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:17px;box-shadow:var(--sh)}

.kpi .v{font-size:24px;font-weight:800;letter-spacing:-1px}

.btn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:15px;border:none;border-radius:14px;font-weight:700;font-size:15.5px;cursor:pointer;transition:.15s;font-family:inherit}
.btn:active{transform:translateY(1px) scale(.99)}
.btn-primary{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff}
.btn-ghost{background:var(--card);border:1px solid var(--line);color:var(--txt)}

.field{display:flex;flex-direction:column;gap:7px;margin-bottom:14px}

.chip.on{background:var(--accent-d);border-color:var(--accent);color:var(--accent)}

.scale{display:flex;gap:6px;flex-wrap:wrap}

.scale button.on{background:var(--accent);border-color:var(--accent);color:#fff}

.li .tx{flex:1;min-width:0}.li .tx b{font-size:14.5px;font-weight:600;display:block}.li .tx small{font-size:12.5px;color:var(--muted)}

.tabbar{position:absolute;bottom:0;left:0;right:0;min-height:76px;background:var(--nav);backdrop-filter:blur(16px);border-top:1px solid var(--line);display:flex;padding:8px 6px calc(14px + env(safe-area-inset-bottom));z-index:30}

.tab .ic{font-size:21px;line-height:1}
.tab.on{color:var(--accent)}
.tab.on::before{content:"";position:absolute;top:1px;width:26px;height:3px;border-radius:3px;background:var(--accent)}
.tab:active{transform:scale(.92)}
.sheet-bg{position:absolute;inset:0;background:rgba(0,0,0,.6);z-index:50;display:none;align-items:flex-end;animation:fade .2s}
.sheet-bg.open{display:flex}
.sheet{width:100%;max-height:90%;overflow-y:auto;background:var(--bg2);border-radius:24px 24px 0 0;border-top:1px solid var(--line);padding:10px 18px calc(28px + env(safe-area-inset-bottom));animation:up .3s cubic-bezier(.2,.8,.2,1)}
@keyframes up{from{transform:translateY(100%)}to{transform:none}}
.grip{width:40px;height:4px;border-radius:3px;background:var(--line);margin:8px auto 14px}
.toast{position:absolute;bottom:96px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--card2);border:1px solid var(--accent);color:var(--txt);padding:12px 20px;border-radius:14px;font-size:14px;font-weight:600;z-index:80;opacity:0;transition:.3s;box-shadow:var(--sh);pointer-events:none;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.pbar{height:7px;border-radius:6px;background:var(--bg2);overflow:hidden}
.pbar i{display:block;height:100%;border-radius:6px;background:linear-gradient(90deg,var(--accent),var(--accent2))}
.badge{display:inline-block;padding:3px 9px;border-radius:8px;font-size:10.5px;font-weight:700}
.badge.accent{background:var(--accent-d);color:var(--accent)}
.splash{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;text-align:center;padding:30px;background:radial-gradient(120% 80% at 50% 0%,#241b45 0%,var(--bg) 55%)}
.logo-mark{width:92px;height:92px;border-radius:27px;display:flex;align-items:center;justify-content:center;font-size:44px;font-weight:800;color:#fff;background:linear-gradient(140deg,var(--accent),var(--accent2));box-shadow:0 20px 50px rgba(155,124,255,.35)}
.disc-note{background:var(--card2);border-radius:12px;padding:11px 13px;font-size:11.5px;color:var(--muted);line-height:1.55}
.center{text-align:center}.muted{color:var(--muted)}.row{display:flex;align-items:center}.between{display:flex;align-items:center;justify-content:space-between}
.empty-art{width:84px;height:84px;margin:2px auto 8px;color:var(--accent);opacity:.9}
.empty-art svg{width:100%;height:100%}
a{color:var(--accent2)}
</style>

<script>
/* ============================================================

const $=(s,r)=>(r||document).querySelector(s);

const KEY='maeen_eoe_v1';

/* ---------- i18n ---------- */
const I18N={
  appName:{en:'Maeen',ar:'معين'},tagline:{en:'your EoE companion',ar:'رفيقك مع التهاب المريء اليوزيني'},
  getStarted:{en:'Get started',ar:'لنبدأ'},chooseLang:{en:'Choose your language',ar:'اختر لغتك'},continue:{en:'Continue',ar:'متابعة'},

  consentT:{en:'Before we start',ar:'قبل أن نبدأ'},
  consentBody:{en:"Maeen is a non-medical health companion for eosinophilic esophagitis (EoE). It helps you record symptoms, triggers, diet and treatment, see descriptive trends, and learn.\n\nIt does NOT provide medical advice, diagnosis, predictions, or treatment recommendations, and is not a medical device. All scores and charts are descriptive only.\n\nAlways consult your healthcare provider for any medical decision. If food is stuck and you cannot swallow your own saliva, or you have chest pain or trouble breathing, seek urgent care.",ar:"معين رفيق صحي غير طبي لالتهاب المريء اليوزيني. يساعدك على تسجيل الأعراض والمحفّزات والغذاء والعلاج، ورؤية اتجاهات وصفية، والتعلّم.\n\nلا يقدّم نصيحة طبية أو تشخيصًا أو تنبؤًا أو توصيات علاجية، وليس جهازًا طبيًا. كل الدرجات والرسوم وصفية فقط.\n\nاستشر دائمًا مقدّم الرعاية الصحية. إذا انحشر الطعام ولم تستطع بلع ريقك، أو شعرت بألم في الصدر أو صعوبة تنفّس، اطلب رعاية عاجلة."},
  yourName:{en:'Your name',ar:'اسمك'},namePh:{en:'e.g. Sara',ar:'مثال: سارة'},
  tabToday:{en:'Today',ar:'اليوم'},tabTrack:{en:'Track',ar:'تتبّع'},tabScores:{en:'Scores',ar:'الدرجات'},tabLearn:{en:'Learn',ar:'تعلّم'},tabMore:{en:'More',ar:'المزيد'},
  goodMorning:{en:'Good morning',ar:'صباح الخير'},goodAfternoon:{en:'Good afternoon',ar:'مساء الخير'},goodEvening:{en:'Good evening',ar:'مساء الخير'},
  checkinT:{en:'Daily check-in',ar:'تسجيل اليوم'},checkinSub:{en:'How was swallowing today?',ar:'كيف كان البلع اليوم؟'},
  quickLog:{en:'Quick log',ar:'تسجيل سريع'},
  logDysphagia:{en:'Dysphagia',ar:'صعوبة بلع'},logImpaction:{en:'Food stuck',ar:'انحشار طعام'},logMeal:{en:'Meal / trigger',ar:'وجبة / محفّز'},logReflux:{en:'Reflux',ar:'ارتجاع'},logAdapt:{en:'Eating tactic',ar:'حيلة أكل'},logMed:{en:'Medication',ar:'دواء'},
  recent:{en:'Recent activity',ar:'النشاط الأخير'},noLogs:{en:'No entries yet — tap a quick-log button to start.',ar:'لا سجلات بعد — اضغط زر تسجيل سريع للبدء.'},
  streak:{en:'day streak',ar:'يوم متتابع'},
  trackT:{en:'Track',ar:'تتبّع'},trackSub:{en:'Log symptoms, food and treatment',ar:'سجّل الأعراض والطعام والعلاج'},
  scoresT:{en:'Scores',ar:'الدرجات'},scoresSub:{en:'Descriptive self-assessment',ar:'تقييم ذاتي وصفي'},
  learnT:{en:'Learn',ar:'تعلّم'},learnSub:{en:'Understand EoE',ar:'افهم المرض'},
  moreT:{en:'More',ar:'المزيد'},
  severity:{en:'Severity',ar:'الشدة'},frequency:{en:'How often today',ar:'كم مرة اليوم'},notes:{en:'Notes (optional)',ar:'ملاحظات (اختياري)'},notesPh:{en:'Anything to remember…',ar:'أي شيء تود تذكّره…'},save:{en:'Save',ar:'حفظ'},cancel:{en:'Cancel',ar:'إلغاء'},saved:{en:'Saved',ar:'تم الحفظ'},loggedOk:{en:'Logged ✓',ar:'تم التسجيل ✓'},
  minRead:{en:'min read',ar:'دقيقة قراءة'},
  none:{en:'None',ar:'لا شيء'},mild:{en:'Mild',ar:'خفيف'},moderate:{en:'Moderate',ar:'متوسط'},severe:{en:'Severe',ar:'شديد'},
  export:{en:'Export my data',ar:'تصدير بياناتي'},del:{en:'Delete my data',ar:'حذف بياناتي'},
  theme:{en:'Theme',ar:'المظهر'},language:{en:'Language',ar:'اللغة'},about:{en:'About & disclaimer',ar:'حول وإخلاء المسؤولية'},share:{en:'Share with my doctor',ar:'مشاركة مع طبيبي'},
  back:{en:'Back',ar:'رجوع'}
};
function isAr(){return S.lang==='ar';}
function t(k){const e=I18N[k];return e?(isAr()?e.ar:e.en):k;}
function L(arr){return isAr()?(arr[1]||arr[0]):arr[0];}

/* ---------- EoE domain data ---------- */
// Eating-difficulty by food consistency (EEsAI-style, descriptive 0-4 impact)
const CONSIST=[['Soft foods (yogurt, eggs)','أطعمة طريّة (زبادي، بيض)'],['Solid meat / chicken','لحوم / دجاج صلبة'],['Rice / bread','أرز / خبز'],['Raw vegetables / fruit','خضار / فواكه نيئة'],['Dry / crumbly (biscuit)','جافّة / متفتّتة (بسكويت)'],['Tablets / pills','أقراص / حبوب']];
// EEsAI behaviour items
const EBEH=[['I avoided certain foods','تجنّبت أطعمة معيّنة'],['I changed how I prepared food (cut small, sauce)','غيّرت طريقة التحضير (تقطيع، صلصة)'],['I ate more slowly than others','أكلت أبطأ من غيري'],['I drank fluids to wash food down','شربت سوائل لتمرير الطعام']];
// Six-food elimination triggers (+common others)
const TRIGGERS=[['Milk / dairy','حليب / ألبان'],['Wheat / gluten','قمح / غلوتين'],['Egg','بيض'],['Soy / legumes','صويا / بقوليات'],['Nuts / peanuts','مكسّرات / فول سوداني'],['Fish / shellfish','سمك / محار'],['Beef / lamb','لحم بقر / غنم'],['Other','أخرى']];
// Eating adaptations (IMPACT coping behaviours)
const ADAPT=[['Cut food into small pieces','قطّعت الطعام لقطع صغيرة'],['Chewed very thoroughly','مضغت جيدًا جدًا'],['Drank to wash food down','شربت لتمرير الطعام'],['Avoided hard / dry foods','تجنّبت الأطعمة الصلبة/الجافة'],['Ate slowly','أكلت ببطء'],['Used sauces / lubrication','استخدمت الصلصات للترطيب']];
// Treatments — the "3 D's"
const MEDS=[
 {id:'ppi',n:['Proton-pump inhibitor (PPI)','مثبّط مضخة البروتون'],note:['e.g. omeprazole, esomeprazole','مثل أوميبرازول، إيزوميبرازول']},
 {id:'budesonide',n:['Swallowed budesonide','بوديزونيد مبلوع'],note:['Swallow, then no food/drink 30 min','ابلع، ثم لا طعام/شراب ٣٠ دقيقة']},
 {id:'fluticasone',n:['Swallowed fluticasone','فلوتيكازون مبلوع'],note:['Spray & swallow, then no food/drink 30 min','رُذّ وابلع، ثم لا طعام/شراب ٣٠ دقيقة']},
 {id:'dupilumab',n:['Dupilumab (biologic injection)','دوبيلوماب (حقنة حيوية)'],note:['Usually weekly','عادة أسبوعيًا']},
];
const DIETS=[['No diet therapy','بدون حمية علاجية'],['Six-food elimination','حذف الأطعمة الستة'],['Four-food elimination','حذف الأطعمة الأربعة'],['One-food (milk) elimination','حذف غذاء واحد (الحليب)'],['Elemental diet','حمية عنصرية'],['Reintroduction phase','مرحلة إعادة الإدخال']];
const ATOPY=[['Asthma','الربو'],['Eczema','الإكزيما'],['Allergic rhinitis','التهاب الأنف التحسّسي'],['Food allergy','حساسية غذائية']];
// EREFS endoscopy domains (clinician-reported; patient records results)
const EREFS=[{k:'edema',n:['Edema','وذمة'],max:1},{k:'rings',n:['Rings','حلقات'],max:3},{k:'exudates',n:['Exudates','إفرازات بيضاء'],max:2},{k:'furrows',n:['Furrows','أخاديد'],max:2},{k:'stricture',n:['Stricture','تضيّق'],max:1}];

/* ---------- Education library ---------- */
const ART=[
 {id:'what',icon:'📘',cat:'basics',min:4,t:['What is EoE?','ما هو التهاب المريء اليوزيني؟'],body:[
   "Eosinophilic esophagitis (EoE) is a chronic, allergic/immune condition where a type of white blood cell — the eosinophil — builds up in the lining of the esophagus (the food pipe). This inflammation makes the esophagus stiff and narrow, so food can move slowly or get stuck.\n\nEoE is often linked with other allergic conditions such as asthma, eczema and hay fever. It is a long-term condition that is managed, not cured — but with the right treatment most people swallow comfortably again.",
   "التهاب المريء اليوزيني حالة مناعية/تحسّسية مزمنة تتراكم فيها خلية دم بيضاء (اليوزيني/الحمضات) في بطانة المريء (أنبوب الطعام). يجعل هذا الالتهاب المريء متيبّسًا وضيّقًا، فيتحرّك الطعام ببطء أو ينحشر.\n\nيرتبط غالبًا بحالات تحسّسية أخرى كالربو والإكزيما وحساسية الأنف. حالة مزمنة تُدار ولا تُشفى تمامًا — ومع العلاج المناسب يعود معظم الناس للبلع بارتياح."]},
 {id:'symptoms',icon:'🔎',cat:'basics',min:3,t:['Symptoms & red flags','الأعراض والعلامات التحذيرية'],body:[
   "In adults and teens the most common symptom is dysphagia — food feeling slow or stuck when swallowing. People often adapt without realising: cutting food small, chewing a lot, drinking to wash food down, or avoiding dry/tough foods.\n\nOther symptoms: chest or upper-tummy pain, heartburn that does not settle, regurgitation. In young children: feeding difficulty, vomiting, poor weight gain.\n\nRED FLAG — food impaction: if food is stuck and will not pass, and especially if you cannot swallow your own saliva, this is an emergency. Seek urgent care.",
   "لدى البالغين والمراهقين أكثر عَرَض شيوعًا هو عُسر البلع — الإحساس ببطء الطعام أو انحشاره عند البلع. يتأقلم الناس دون أن يدركوا: تقطيع الطعام صغيرًا، المضغ كثيرًا، الشرب لتمريره، أو تجنّب الجاف/القاسي.\n\nأعراض أخرى: ألم بالصدر أو أعلى البطن، حُرقة لا تهدأ، قَلَس. لدى الأطفال الصغار: صعوبة تغذية، قيء، ضعف اكتساب وزن.\n\nعلامة خطر — انحشار الطعام: إذا انحشر الطعام ولم يمرّ، خاصة إن لم تستطع بلع ريقك، فهذه حالة طارئة. اطلب رعاية عاجلة."]},
 {id:'diagnosis',icon:'🩺',cat:'diagnosis',min:4,t:['How EoE is diagnosed','كيف يُشخَّص المرض'],body:[
   "EoE is diagnosed with an upper endoscopy (a thin camera) plus biopsies (tiny tissue samples). Two things are needed: symptoms of esophageal dysfunction, and at least 15 eosinophils per high-power field (eos/hpf) on biopsy, after other causes are excluded.\n\nDuring endoscopy the doctor scores what they see using EREFS — Edema, Rings, Exudates, Furrows and Strictures. Several biopsies are taken from different levels. You can record your biopsy eosinophil count and EREFS in the Scores tab to watch them over time.",
   "يُشخَّص بالمنظار العلوي (كاميرا دقيقة) مع أخذ خزعات (عيّنات نسيج صغيرة). يلزم أمران: أعراض خلل وظيفي بالمريء، ووجود ١٥ خلية يوزينية على الأقل لكل حقل مجهري عالي القوة في الخزعة، بعد استبعاد الأسباب الأخرى.\n\nأثناء المنظار يسجّل الطبيب ما يراه عبر EREFS — وذمة، حلقات، إفرازات، أخاديد، تضيّق. تُؤخذ عدة خزعات من مستويات مختلفة. يمكنك تسجيل عدد اليوزينيات وEREFS في تبويب الدرجات لمتابعتها."]},
 {id:'treat',icon:'💊',cat:'treatment',min:5,t:["The 3 D's: Drugs, Diet, Dilation","العلاجات الثلاثة: الدواء، الحمية، التوسيع"],body:[
   "EoE treatment rests on three pillars — the “3 D’s”:\n\n• DRUGS — proton-pump inhibitors (PPIs); swallowed topical steroids (budesonide or fluticasone) that coat the esophagus; and dupilumab, a biologic injection. Your doctor chooses based on your case.\n\n• DIET — removing trigger foods (most often milk, wheat, egg, soy, nuts, fish/shellfish) to calm inflammation, then carefully reintroducing them to find your triggers.\n\n• DILATION — gently stretching a narrowed esophagus during endoscopy if a stricture is causing food to stick.\n\nTreatment is long-term: when it stops, inflammation usually returns, so follow-up matters.",
   "يقوم العلاج على ثلاثة أعمدة — «العلاجات الثلاثة»:\n\n• الدواء — مثبّطات مضخة البروتون؛ ستيرويدات موضعية مبلوعة (بوديزونيد أو فلوتيكازون) تغلّف المريء؛ ودوبيلوماب، حقنة حيوية. يختار طبيبك حسب حالتك.\n\n• الحمية — إزالة الأطعمة المحفّزة (غالبًا الحليب، القمح، البيض، الصويا، المكسّرات، السمك/المحار) لتهدئة الالتهاب، ثم إعادتها بحذر لتحديد محفّزاتك.\n\n• التوسيع — توسيع لطيف للمريء الضيّق أثناء المنظار إن كان التضيّق يسبّب انحشار الطعام.\n\nالعلاج طويل الأمد: عند إيقافه يعود الالتهاب عادة، لذا المتابعة مهمّة."]},
 {id:'meds',icon:'💉',cat:'treatment',min:4,t:['Medications explained','شرح الأدوية'],body:[
   "PPIs reduce acid and, in many people, also calm esophageal inflammation.\n\nSwallowed topical steroids (budesonide, fluticasone) are designed to coat the esophagus, not go to the lungs. Take them as directed and then avoid eating or drinking for about 30 minutes so the medicine stays in contact. Rinse your mouth to lower the chance of oral thrush.\n\nDupilumab is a biologic injection (often weekly) that blocks part of the allergic pathway; it is approved for EoE. Diet therapy can be used instead of, or alongside, medicines. Never start, stop or change a treatment without your doctor.",
   "تقلّل مثبّطات مضخة البروتون الحمض، وتهدّئ لدى كثيرين التهاب المريء أيضًا.\n\nالستيرويدات الموضعية المبلوعة (بوديزونيد، فلوتيكازون) مصمّمة لتغليف المريء لا للوصول للرئتين. تناولها حسب التعليمات ثم تجنّب الأكل أو الشرب نحو ٣٠ دقيقة ليبقى الدواء ملامسًا. اشطف فمك لتقليل احتمال فطريات الفم.\n\nدوبيلوماب حقنة حيوية (غالبًا أسبوعيًا) تحجب جزءًا من المسار التحسّسي؛ معتمد للمرض. يمكن استخدام الحمية بدلًا من الأدوية أو معها. لا تبدأ أو توقف أو تغيّر علاجًا دون طبيبك."]},
 {id:'diet',icon:'🥗',cat:'diet',min:5,t:['Elimination diets','حِميات الإقصاء'],body:[
   "Diet therapy removes foods that drive the inflammation. The classic approach removes six common triggers — milk, wheat, egg, soy, nuts, and fish/shellfish (the “six-food elimination diet”). Some start smaller (one- or four-food) and step up only if needed.\n\nAfter the esophagus heals on repeat endoscopy, foods are reintroduced one at a time, with endoscopy/biopsy checks, to find which food(s) are your personal triggers — so you only avoid what you must.\n\nThis is best done with a dietitian, especially for children, to keep nutrition complete. Use the Track tab to log meals and suspected triggers.",
   "تزيل الحمية الأطعمة التي تغذّي الالتهاب. الطريقة الكلاسيكية تحذف ستة محفّزات شائعة — الحليب، القمح، البيض، الصويا، المكسّرات، والسمك/المحار («حمية حذف الأطعمة الستة»). يبدأ البعض أصغر (غذاء واحد أو أربعة) ويتدرّج عند الحاجة.\n\nبعد شفاء المريء في منظار المتابعة، تُعاد الأطعمة واحدًا تلو الآخر مع فحوص منظار/خزعة لتحديد محفّزك الشخصي — فتتجنّب ما يلزم فقط.\n\nيُفضّل ذلك مع أخصائي تغذية، خاصة للأطفال، للحفاظ على تغذية كاملة. استخدم تبويب التتبّع لتسجيل الوجبات والمحفّزات المشتبهة."]},
 {id:'tips',icon:'🍽️',cat:'living',min:3,t:['Eating tips & adaptations','نصائح الأكل والتأقلم'],body:[
   "Small habits make meals safer and calmer:\n\n• Cut food into small pieces and chew thoroughly.\n• Eat slowly and don’t rush; put utensils down between bites.\n• Keep water or a drink handy and sip to help food down.\n• Add sauces or moisture to dry foods.\n• Be careful with tough meat, dry bread, rice, and raw fibrous fruit/veg if these stick.\n• Take pills with plenty of water, sitting upright.\n\nLog which tactics you use in the Track tab — over time you’ll see what helps you most.",
   "عادات صغيرة تجعل الوجبات أأمن وأهدأ:\n\n• قطّع الطعام صغيرًا وامضغ جيدًا.\n• كُل ببطء ولا تتعجّل؛ ضَع الأدوات بين اللقمات.\n• أبقِ ماءً قريبًا وارتشف لتمرير الطعام.\n• أضِف صلصات أو رطوبة للأطعمة الجافة.\n• احذر اللحم القاسي والخبز الجاف والأرز والفواكه/الخضار الليفية النيئة إن كانت تنحشر.\n• تناول الحبوب بكثير من الماء وأنت جالس مستقيمًا.\n\nسجّل الحيل التي تستخدمها في تبويب التتبّع — ستلاحظ مع الوقت ما يفيدك أكثر."]},
 {id:'impaction',icon:'🚨',cat:'living',min:3,t:['Food impaction — what to do','انحشار الطعام — ماذا تفعل'],body:[
   "Food impaction means a piece of food is stuck and will not pass. It is the most common emergency in EoE.\n\nIf it happens:\n• Stay calm and stop eating.\n• Do not force more food or large drinks down.\n• Small sips of water may help; if it passes, you’re okay — but tell your doctor.\n• If the food will NOT pass, and especially if you cannot swallow your own saliva (drooling), or you have chest pain or trouble breathing — go to the emergency department now.\n\nNever try to push a stuck piece down with more food. Repeated impactions are a sign your EoE needs review.",
   "انحشار الطعام يعني علوق قطعة طعام دون أن تمرّ. وهو أكثر طارئ شيوعًا في المرض.\n\nإن حدث:\n• اهدأ وتوقّف عن الأكل.\n• لا تدفع مزيدًا من الطعام أو مشروبات كبيرة.\n• رشفات ماء صغيرة قد تساعد؛ إن مرّت فأنت بخير — لكن أخبر طبيبك.\n• إن لم يمرّ الطعام، خاصة إن لم تستطع بلع ريقك (سيلان لعاب)، أو لديك ألم صدر أو صعوبة تنفّس — اذهب للطوارئ الآن.\n\nلا تحاول دفع القطعة بمزيد من الطعام. تكرار الانحشار علامة أن مرضك يحتاج مراجعة."]},
 {id:'living',icon:'🌿',cat:'living',min:4,t:['Living well with EoE','التعايش الجيد مع المرض'],body:[
   "EoE is a marathon, not a sprint. A few things help you stay in control:\n\n• Keep taking treatment even when you feel well — symptoms can improve before the inflammation does.\n• Attend follow-up endoscopies; they show whether treatment is truly working at the tissue level.\n• Manage other allergies (asthma, eczema, rhinitis) with your team.\n• Track symptoms and triggers so visits are productive and decisions are based on your real pattern.\n• Look after mood and mealtime anxiety — eating stress is common and valid.\n\nShare a summary from this app with your doctor to support each visit.",
   "المرض ماراثون لا سباق قصير. أمور تساعدك على البقاء مسيطرًا:\n\n• استمر بالعلاج حتى عند الشعور بالتحسّن — قد تتحسّن الأعراض قبل الالتهاب.\n• احضر مناظير المتابعة؛ تُظهر إن كان العلاج فعّالًا نسيجيًا.\n• أدِر الحساسيات الأخرى (ربو، إكزيما، التهاب أنف) مع فريقك.\n• تابع الأعراض والمحفّزات لتكون الزيارات مثمرة والقرارات مبنية على نمطك الحقيقي.\n• اعتنِ بالمزاج وقلق الأكل — توتّر الطعام شائع ومفهوم.\n\nشارك ملخّصًا من التطبيق مع طبيبك لدعم كل زيارة."]},
 {id:'kids',icon:'🧒',cat:'basics',min:3,t:['EoE in children','المرض عند الأطفال'],body:[
   "In children EoE can look different. Babies and toddlers may refuse food, gag or vomit, have tummy pain, or gain weight slowly. Older children may say food gets stuck or simply become very slow, picky eaters.\n\nDiagnosis still needs endoscopy and biopsy. Treatment uses the same tools — PPIs, swallowed steroids, dupilumab (approved down to young ages by weight), and diet — always guided by a pediatric team and dietitian to protect growth.\n\nWatch for choking, drooling, or inability to swallow saliva, which need urgent care.",
   "عند الأطفال قد يبدو المرض مختلفًا. الرُّضّع والصغار قد يرفضون الطعام أو يتقيّؤون أو يعانون ألم بطن أو بطء اكتساب وزن. الأكبر قد يقولون إن الطعام ينحشر أو يصبحون بطيئين انتقائيين في الأكل.\n\nيظل التشخيص يحتاج منظارًا وخزعة. يستخدم العلاج الأدوات نفسها — مثبّطات المضخة، ستيرويدات مبلوعة، دوبيلوماب (معتمد لأعمار صغيرة حسب الوزن)، والحمية — دائمًا بإشراف فريق أطفال وأخصائي تغذية لحماية النمو.\n\nانتبه للاختناق أو سيلان اللعاب أو عدم القدرة على بلع الريق، فهي تحتاج رعاية عاجلة."]},
];
const CATS={all:['All','الكل'],basics:['Basics','الأساسيات'],diagnosis:['Diagnosis','التشخيص'],treatment:['Treatment','العلاج'],diet:['Diet','الحمية'],living:['Living well','التعايش']};

/* ---------- state ---------- */
function blank(){return{
  lang:null, onboarded:false,
  user:{name:''},
  prefs:{theme:'dark'},
  logs:[],                 // {id,type,t,...}
  eesai:[],                // {date, items:{consistency...}, beh:{...}, score}
  dsq:[],                  // {date, freq, stuck}
  erefs:[],                // {date, edema,rings,exudates,furrows,stricture, total}
  eos:[],                  // {date, count}
  meds:[],                 // {id, on}
  diet:'',                 // current diet therapy index
  atopy:{},                // {asthma:true,...}
  seenDays:[]
};}
function deepMerge(b,o){if(b===null||typeof b!=='object'||Array.isArray(b))return o===undefined?b:o;const out=Object.assign({},b);if(o&&typeof o==='object'&&!Array.isArray(o)){for(const k in o){const x=b[k],y=o[k];out[k]=(x&&typeof x==='object'&&!Array.isArray(x)&&y&&typeof y==='object'&&!Array.isArray(y))?deepMerge(x,y):y;}}return out;}
function load(){try{const v=JSON.parse(localStorage.getItem(KEY));return v?deepMerge(blank(),v):blank();}catch(e){return blank();}}
function save(){try{localStorage.setItem(KEY,JSON.stringify(S));}catch(e){}}
let S=load();

/* ---------- date helpers ---------- */
function todayKey(d){d=d||new Date();return d.toISOString().slice(0,10);}
function daysAgo(k){return Math.round((Date.now()-new Date(k+'T00:00').getTime())/864e5);}
function lastNDays(n){const a=[];for(let i=n-1;i>=0;i--){const d=new Date();d.setDate(d.getDate()-i);a.push(todayKey(d));}return a;}
function fmtDate(iso){const d=new Date(iso);return d.toLocaleDateString(isAr()?'ar-SA':'en-GB',{day:'numeric',month:'short'});}
function fmtTime(iso){return new Date(iso).toLocaleTimeString(isAr()?'ar-SA':'en-GB',{hour:'2-digit',minute:'2-digit'});}
function streak(){let n=0;for(let i=0;i<400;i++){const d=new Date();d.setDate(d.getDate()-i);if(S.seenDays.includes(todayKey(d)))n++;else if(i>0)break;}return n;}
function markDay(){const k=todayKey();if(!S.seenDays.includes(k)){S.seenDays.push(k);save();}}

/* ---------- UI helpers ---------- */
function toast(m){const e=$('#toast');e.textContent=m;e.classList.add('show');clearTimeout(e._t);e._t=setTimeout(()=>e.classList.remove('show'),1800);}
function openSheet(h){$('#sheet').innerHTML='<div class="grip"></div>'+h;$('#sheetbg').classList.add('open');}
function closeSheet(){$('#sheetbg').classList.remove('open');}
$('#sheetbg').addEventListener('click',e=>{if(e.target.id==='sheetbg')closeSheet();});
function topbar(titleK,subK,opts){opts=opts||{};const left=opts.back?`<button class="iconbtn" onclick="goBack()">${isAr()?'›':'‹'}</button>`:'';const right=opts.right||'';return `<div class="topbar">${left}<div style="flex:1"><h1>${opts.rawTitle||t(titleK)}</h1>${subK||opts.rawSub?`<div class="sub">${opts.rawSub||t(subK)}</div>`:''}</div>${right}</div>`;}
function applyTheme(){document.documentElement.setAttribute('data-mode',S.prefs.theme==='light'?'light':'dark');const m=$('meta[name=theme-color]');if(m)m.setAttribute('content',S.prefs.theme==='light'?'#F4F6FB':'#0B0F14');}
function applyDir(){document.documentElement.lang=S.lang||'en';document.documentElement.dir=isAr()?'rtl':'ltr';applyTheme();}

/* ---------- router ---------- */
const ROUTES={};let CURRENT='splash',STACK=[],CURRENT_OPTS={};
function route(n,fn){ROUTES[n]=fn;}
function go(n,o){o=o||{};if(!o.replace&&CURRENT&&CURRENT!==n)STACK.push(CURRENT);CURRENT=n;CURRENT_OPTS=o;render();}
function goBack(){if(STACK.length){CURRENT=STACK.pop();render();}else navTab('today');}
const MAIN=['today','track','scores','learn','more'];
function navTab(n){STACK=[];CURRENT=n;CURRENT_OPTS={};render();}
function render(){applyDir();const host=$('#screens');host.innerHTML='';const fn=ROUTES[CURRENT]||ROUTES['today'];const node=el('<div class="screen active"></div>');fn(node,CURRENT_OPTS);host.appendChild(node);node.scrollTop=0;const tb=$('#tabbar');if(MAIN.includes(CURRENT)){tb.classList.remove('hidden');renderTabs();}else tb.classList.add('hidden');}
function renderTabs(){const tb=$('#tabbar');const items=[['today','🏠','tabToday'],['track','➕','tabTrack'],['scores','📊','tabScores'],['learn','📚','tabLearn'],['more','⋯','tabMore']];tb.innerHTML=items.map(([n,ic,lab])=>`<button class="tab ${CURRENT===n?'on':''}" onclick="navTab('${n}')"><span class="ic">${ic}</span>${t(lab)}</button>`).join('');}

/* ---------- charts (inline SVG) ---------- */
function sparkline(vals,color,W,H){W=W||300;H=H||70;color=color||'var(--accent)';if(!vals.length)return '';const mx=Math.max(...vals,1),mn=Math.min(...vals,0);const X=i=>10+i*(W-20)/Math.max(vals.length-1,1);const Y=v=>H-12-(v-mn)/(mx-mn||1)*(H-24);const pts=vals.map((v,i)=>`${X(i).toFixed(1)},${Y(v).toFixed(1)}`).join(' ');const dots=vals.map((v,i)=>`<circle cx="${X(i).toFixed(1)}" cy="${Y(v).toFixed(1)}" r="2.4" fill="${color}"/>`).join('');return `<svg viewBox="0 0 ${W} ${H}" width="100%" preserveAspectRatio="xMidYMid meet"><polyline fill="none" stroke="${color}" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" points="${pts}"/>${dots}</svg>`;}
function barChart(vals,labels,color,ref){const W=320,H=120,n=vals.length;color=color||'var(--accent2)';const mx=Math.max(...vals,ref||0,1);const bw=(W-30)/n*.62;const X=i=>20+i*(W-30)/n+((W-30)/n-bw)/2;const Y=v=>H-20-v/mx*(H-34);let bars=vals.map((v,i)=>`<rect x="${X(i).toFixed(1)}" y="${Y(v).toFixed(1)}" width="${bw.toFixed(1)}" height="${(H-20-Y(v)).toFixed(1)}" rx="3" fill="${color}"/>`).join('');let rl='';if(ref){rl=`<line x1="20" y1="${Y(ref).toFixed(1)}" x2="${W-10}" y2="${Y(ref).toFixed(1)}" stroke="var(--bad)" stroke-width="1.4" stroke-dasharray="4 3"/><text x="${W-12}" y="${(Y(ref)-3).toFixed(1)}" text-anchor="end" font-size="9" fill="var(--bad)">${ref}</text>`;}const xl=labels?labels.map((l,i)=>`<text x="${(X(i)+bw/2).toFixed(1)}" y="${H-7}" text-anchor="middle" font-size="8" fill="var(--faint)">${l}</text>`).join(''):'';return `<svg viewBox="0 0 ${W} ${H}" width="100%" preserveAspectRatio="xMidYMid meet" font-family="inherit">${bars}${rl}${xl}</svg>`;}
function radar(vals,maxes,labels){const N=vals.length,cx=150,cy=140,R=92;const pt=(i,r)=>{const a=-Math.PI/2+i*2*Math.PI/N;return [cx+r*Math.cos(a),cy+r*Math.sin(a)];};let grid='';[.25,.5,.75,1].forEach(g=>{grid+=`<polygon points="${Array.from({length:N}).map((_,i)=>pt(i,R*g).join(',')).join(' ')}" fill="none" stroke="var(--line)" stroke-width="1"/>`;});let spokes='';for(let i=0;i<N;i++){const[x,y]=pt(i,R);spokes+=`<line x1="${cx}" y1="${cy}" x2="${x.toFixed(1)}" y2="${y.toFixed(1)}" stroke="var(--line)"/>`;}const poly=`<polygon points="${vals.map((v,i)=>pt(i,R*(v/(maxes[i]||1))).join(',')).join(' ')}" fill="var(--accent)" fill-opacity=".3" stroke="var(--accent)" stroke-width="2"/>`;const dots=vals.map((v,i)=>{const[x,y]=pt(i,R*(v/(maxes[i]||1)));return `<circle cx="${x.toFixed(1)}" cy="${y.toFixed(1)}" r="3" fill="var(--accent)"/>`;}).join('');const labs=labels.map((d,i)=>{const[x,y]=pt(i,R+16);return `<text x="${x.toFixed(1)}" y="${y.toFixed(1)}" font-size="9.5" fill="var(--muted)" text-anchor="middle">${d}</text>`;}).join('');return `<svg viewBox="0 0 300 280" width="100%" style="max-width:320px" font-family="inherit">${grid}${spokes}${poly}${dots}${labs}</svg>`;}
function heatmap(){const days=lastNDays(35);return `<div style="display:grid;grid-template-columns:repeat(7,1fr);gap:5px">${days.map(d=>{const c=S.logs.filter(l=>l.t.slice(0,10)===d).length;const lvl=c===0?0:c<2?1:c<4?2:3;const col=['var(--card2)','#3a2a55','#6d4aa8','var(--accent)'][lvl];return `<div title="${d}" style="aspect-ratio:1;border-radius:5px;background:${col};border:1px solid var(--line)"></div>`;}).join('')}</div>`;}

/* ============================================================ SCREENS ============================================================ */

  setTimeout(()=>{if(!S.lang)go('lang',{replace:true});else if(!S.onboarded)go('consent',{replace:true});else navTab('today');},900);});

route('today',(n)=>{markDay();const st=streak();const recent=S.logs.slice().sort((a,b)=>new Date(b.t)-new Date(a.t)).slice(0,5);
  const eesaiVals=S.eesai.slice(-10).map(e=>e.score);
  n.innerHTML=`${topbar(null,null,{rawTitle:greeting(),rawSub:S.user.name?esc(S.user.name):t('tagline'),right:`<button class="iconbtn" onclick="navTab('more')">⚙️</button>`})}
  <div class="content">
   <div class="card tap" onclick="openEesai()" style="background:linear-gradient(140deg,var(--accent-d),transparent)">
     <div class="between"><div><b style="font-size:15.5px">${t('checkinT')}</b><div class="muted" style="font-size:12.5px;margin-top:2px">${t('checkinSub')}</div></div><span style="font-size:24px">📝</span></div></div>
   <div class="grid3">
     <div class="kpi"><div class="v" style="color:var(--accent)">${st}</div><div class="l">${t('streak')}</div></div>
     <div class="kpi"><div class="v">${S.eesai.length?S.eesai[S.eesai.length-1].score:'—'}</div><div class="l">EEsAI</div></div>
     <div class="kpi"><div class="v">${S.logs.filter(l=>l.t.slice(0,10)===todayKey()).length}</div><div class="l">${isAr()?'سجلات اليوم':'logs today'}</div></div>
   </div>
   <div class="section-title">${t('quickLog')}</div>
   <div class="chips" style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:9px">
     ${[['dysphagia','😣','logDysphagia'],['impaction','🚨','logImpaction'],['meal','🍽️','logMeal'],['reflux','🔥','logReflux'],['adapt','🧩','logAdapt'],['med','💊','logMed']].map(([ty,ic,lab])=>`<button class="chip" style="flex-direction:column;display:flex;align-items:center;gap:5px;padding:13px 6px" onclick="openLog('${ty}')"><span style="font-size:21px">${ic}</span>${t(lab)}</button>`).join('')}
   </div>
   ${eesaiVals.length>1?`<div class="card"><div class="section-title" style="margin:0 0 8px">${isAr()?'اتجاه الأعراض (EEsAI)':'Symptom trend (EEsAI)'}</div>${sparkline(eesaiVals)}</div>`:''}
   <div class="section-title">${t('recent')}</div>
   <div class="card">${recent.length?recent.map(liRow).join(''):`<p class="muted" style="padding:8px">${t('noLogs')}</p>`}</div>
  </div>`;});

const TYPE_META={dysphagia:['😣',['Dysphagia','صعوبة بلع']],impaction:['🚨',['Food stuck','انحشار طعام']],meal:['🍽️',['Meal','وجبة']],reflux:['🔥',['Reflux / heartburn','ارتجاع / حُرقة']],adapt:['🧩',['Eating tactic','حيلة أكل']],med:['💊',['Medication','دواء']],chest:['💢',['Chest pain','ألم صدر']]};
function liRow(l){const m=TYPE_META[l.type]||['•',['Log','سجل']];let sub='';if(l.sev!=null)sub=[t('none'),t('mild'),t('moderate'),t('severe')][l.sev]||'';if(l.type==='meal'&&l.triggers)sub=l.triggers.map(i=>L(TRIGGERS[i])).join(', ');if(l.type==='adapt'&&l.items)sub=l.items.map(i=>L(ADAPT[i])).join(', ');if(l.type==='med'&&l.med)sub=L((MEDS.find(x=>x.id===l.med)||{n:['','']}).n);if(l.notes)sub=(sub?sub+' · ':'')+esc(l.notes.slice(0,40));return `<div class="li"><div class="ic">${m[0]}</div><div class="tx"><b>${L(m[1])}</b><small>${sub||fmtDate(l.t)}</small></div><small class="muted">${fmtTime(l.t)}</small></div>`;}
function addLog(o){o.id=rid();o.t=o.t||new Date().toISOString();S.logs.push(o);save();}

/* ---- loggers ---- */
let _tmp={};
window.openLog=function(ty){_tmp={};const ar=isAr();
  if(ty==='dysphagia'||ty==='reflux'||ty==='impaction'){
    const sevQ=ty==='impaction'?(ar?'هل مرّ الطعام في النهاية؟':'Did the food eventually pass?'):t('severity');
    openSheet(`<h2 style="margin:4px 0 14px">${TYPE_META[ty][0]} ${L(TYPE_META[ty][1])}</h2>
     ${ty==='impaction'?`<div class="disc-note" style="background:rgba(255,92,114,.12);color:var(--bad);margin-bottom:14px">${ar?'إن لم تستطع بلع ريقك أو لديك ألم صدر/صعوبة تنفّس — اطلب رعاية عاجلة الآن.':'If you cannot swallow saliva, or have chest pain / trouble breathing — seek urgent care now.'}</div>`:''}
     <div class="field"><label>${sevQ}</label>${ty==='impaction'?`<div class="chips" id="impPass">${[[1,ar?'نعم، مرّ':'Yes, passed'],[0,ar?'لا، احتجت مساعدة':'No, needed help']].map(([v,l])=>`<button class="chip" data-v="${v}" onclick="pick('impPass',this)">${l}</button>`).join('')}</div>`:`<div class="scale" id="sev">${[0,1,2,3].map(i=>`<button data-v="${i}" onclick="pickScale('sev',this)">${[t('none'),t('mild'),t('moderate'),t('severe')][i]}</button>`).join('')}</div>`}</div>
     ${ty==='dysphagia'?`<div class="field"><label>${ar?'مع أي طعام؟':'With which food?'}</label><div class="chips" id="dCons">${CONSIST.map((c,i)=>`<button class="chip" data-v="${i}" onclick="pickMulti('dCons',this)">${L(c)}</button>`).join('')}</div></div>`:''}
     <div class="field"><label>${t('notes')}</label><textarea class="input" id="nt" placeholder="${t('notesPh')}"></textarea></div>
     <button class="btn btn-primary" onclick="saveSimple('${ty}')">${t('save')}</button>`);
  } else if(ty==='meal'){
    openSheet(`<h2 style="margin:4px 0 14px">🍽️ ${L(['Meal / trigger','وجبة / محفّز'])}</h2>
     <div class="field"><label>${ar?'ماذا أكلت؟':'What did you eat?'}</label><textarea class="input" id="desc" placeholder="${ar?'صف الوجبة…':'Describe the meal…'}"></textarea></div>
     <div class="field"><label>${ar?'محفّزات محتملة':'Possible triggers'}</label><div class="chips" id="trg">${TRIGGERS.map((c,i)=>`<button class="chip" data-v="${i}" onclick="pickMulti('trg',this)">${L(c)}</button>`).join('')}</div></div>
     <div class="field"><label>${ar?'هل سبّبت أعراضًا؟':'Did it cause symptoms?'}</label><div class="scale" id="sev">${[0,1,2,3].map(i=>`<button data-v="${i}" onclick="pickScale('sev',this)">${[t('none'),t('mild'),t('moderate'),t('severe')][i]}</button>`).join('')}</div></div>
     <button class="btn btn-primary" onclick="saveMeal()">${t('save')}</button>`);
  } else if(ty==='adapt'){
    openSheet(`<h2 style="margin:4px 0 14px">🧩 ${L(['Eating tactics used','حيل الأكل المستخدمة'])}</h2>
     <div class="field"><label>${ar?'اختر ما فعلته':'Select what you did'}</label><div class="chips" id="adp">${ADAPT.map((c,i)=>`<button class="chip" data-v="${i}" onclick="pickMulti('adp',this)">${L(c)}</button>`).join('')}</div></div>
     <button class="btn btn-primary" onclick="saveAdapt()">${t('save')}</button>`);
  } else if(ty==='med'){
    openSheet(`<h2 style="margin:4px 0 14px">💊 ${L(['Medication taken','دواء تم تناوله'])}</h2>
     <div class="field"><label>${ar?'اختر الدواء':'Choose medication'}</label><div class="chips" id="md">${MEDS.map(m=>`<button class="chip" data-v="${m.id}" onclick="pick('md',this)">${L(m.n)}</button>`).join('')}</div></div>
     <div class="disc-note">${ar?'تذكير: بعد الستيرويد المبلوع، تجنّب الأكل/الشرب نحو ٣٠ دقيقة واشطف فمك.':'Reminder: after swallowed steroids, avoid food/drink for ~30 min and rinse your mouth.'}</div>
     <button class="btn btn-primary" style="margin-top:14px" onclick="saveMed()">${t('save')}</button>`);
  }
};
window.pickScale=(id,b)=>{$('#'+id).querySelectorAll('button').forEach(x=>x.classList.remove('on'));b.classList.add('on');$('#'+id).dataset.val=b.dataset.v;};
window.pick=(id,b)=>{$('#'+id).querySelectorAll('.chip').forEach(x=>x.classList.remove('on'));b.classList.add('on');$('#'+id).dataset.val=b.dataset.v;};
window.pickMulti=(id,b)=>{b.classList.toggle('on');};
function getMulti(id){return [...$('#'+id).querySelectorAll('.chip.on')].map(x=>+x.dataset.v);}
window.saveSimple=(ty)=>{const o={type:ty,notes:($('#nt')&&$('#nt').value||'').trim()};const sev=$('#sev');if(sev&&sev.dataset.val!=null)o.sev=+sev.dataset.val;const ip=$('#impPass');if(ip&&ip.dataset.val!=null)o.passed=+ip.dataset.val;const dc=$('#dCons');if(dc)o.cons=getMulti('dCons');addLog(o);closeSheet();toast(t('loggedOk'));render();};
window.saveMeal=()=>{addLog({type:'meal',desc:($('#desc').value||'').trim(),triggers:getMulti('trg'),sev:$('#sev').dataset.val!=null?+$('#sev').dataset.val:null});closeSheet();toast(t('loggedOk'));render();};
window.saveAdapt=()=>{addLog({type:'adapt',items:getMulti('adp')});closeSheet();toast(t('loggedOk'));render();};
window.saveMed=()=>{const m=$('#md');if(!m.dataset.val)return toast(isAr()?'اختر دواء':'Pick a medication');addLog({type:'med',med:m.dataset.val});closeSheet();toast(t('loggedOk'));render();};

route('track',(n)=>{const ar=isAr();const byDay={};S.logs.slice().sort((a,b)=>new Date(b.t)-new Date(a.t)).forEach(l=>{const k=l.t.slice(0,10);(byDay[k]=byDay[k]||[]).push(l);});const keys=Object.keys(byDay);
  n.innerHTML=`${topbar('trackT','trackSub')}<div class="content">
   <div class="grid3">${[['dysphagia','😣','logDysphagia'],['impaction','🚨','logImpaction'],['meal','🍽️','logMeal'],['reflux','🔥','logReflux'],['adapt','🧩','logAdapt'],['med','💊','logMed']].map(([ty,ic,lab])=>`<button class="chip" style="flex-direction:column;display:flex;align-items:center;gap:5px;padding:13px 6px" onclick="openLog('${ty}')"><span style="font-size:21px">${ic}</span>${t(lab)}</button>`).join('')}</div>
   <button class="btn btn-ghost" onclick="go('triggers')">🧪 ${ar?'محلّل المحفّزات':'Trigger finder'}</button>
   ${keys.length?keys.map(k=>`<div><div class="section-title">${fmtDate(k+'T00:00')} · ${daysAgo(k)===0?(ar?'اليوم':'today'):daysAgo(k)+' '+(ar?'يوم':'d')}</div><div class="card">${byDay[k].map(liRow).join('')}</div></div>`).join(''):`<div class="card center" style="padding:30px">${emptyArt()}<p class="muted">${t('noLogs')}</p></div>`}
  </div>`;});
function emptyArt(){return `<div class="empty-art"><svg viewBox="0 0 64 64" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M24 18h27M24 32h27M24 46h27"/><circle cx="13" cy="18" r="2.3"/><circle cx="13" cy="32" r="2.3"/><circle cx="13" cy="46" r="2.3"/></svg></div>`;}

route('triggers',(n)=>{const ar=isAr();const meals=S.logs.filter(l=>l.type==='meal'&&l.triggers&&l.triggers.length);const counts={};TRIGGERS.forEach((_,i)=>counts[i]={tot:0,sym:0});meals.forEach(m=>{m.triggers.forEach(i=>{counts[i].tot++;if((m.sev||0)>=2)counts[i].sym++;});});const rows=TRIGGERS.map((c,i)=>({n:L(c),...counts[i],rate:counts[i].tot?Math.round(counts[i].sym/counts[i].tot*100):0})).filter(r=>r.tot>0).sort((a,b)=>b.rate-a.rate);
  n.innerHTML=`${topbar(null,null,{back:true,rawTitle:ar?'محلّل المحفّزات':'Trigger finder'})}<div class="content">
   <div class="disc-note">${ar?'ارتباط وصفي فقط بين الأطعمة المسجّلة والأعراض — ليس إثباتًا للسبب. أكّد محفّزاتك مع طبيبك عبر حمية الإقصاء وإعادة الإدخال.':'Descriptive association only between logged foods and symptoms — not proof of cause. Confirm your triggers with your doctor via elimination and reintroduction.'}</div>
   ${rows.length?`<div class="card">${rows.map(r=>`<div style="margin-bottom:12px"><div class="between" style="margin-bottom:4px"><span style="font-size:13.5px">${r.n}</span><b style="font-size:13px;color:${r.rate>=50?'var(--bad)':r.rate>=25?'var(--warn)':'var(--good)'}">${r.rate}%</b></div><div class="pbar"><i style="width:${r.rate}%"></i></div><small class="muted">${r.sym}/${r.tot} ${ar?'وجبات مع أعراض':'meals with symptoms'}</small></div>`).join('')}</div>`:`<div class="card center" style="padding:26px"><p class="muted">${ar?'سجّل وجبات مع محفّزاتها لرؤية الأنماط.':'Log meals with their triggers to see patterns.'}</p></div>`}
  </div>`;});

route('scores',(n)=>{const ar=isAr();const eesai=S.eesai.slice(-12);const erefs=S.erefs[S.erefs.length-1];const eos=S.eos.slice(-8);
  n.innerHTML=`${topbar('scoresT','scoresSub')}<div class="content">
   <div class="disc-note">${ar?'كل الدرجات وصفية للمتابعة والنقاش مع فريقك — وليست تشخيصًا.':'All scores are descriptive, to track and discuss with your team — not a diagnosis.'}</div>
   <div class="card tap" onclick="openEesai()"><div class="between"><div><b>EEsAI · ${ar?'مؤشّر أعراض البلع':'swallowing symptom index'}</b><div class="muted" style="font-size:12px;margin-top:2px">${ar?'تقييم ذاتي (٠–١٠٠، أعلى = أصعب)':'self-report (0–100, higher = worse)'}</div></div><b style="font-size:24px;color:var(--accent)">${S.eesai.length?S.eesai[S.eesai.length-1].score:'—'}</b></div>
     ${eesai.length>1?`<div style="margin-top:10px">${sparkline(eesai.map(e=>e.score))}</div>`:''}</div>
   <div class="card tap" onclick="openDsq()"><div class="between"><div><b>DSQ · ${ar?'يوميات البلع':'dysphagia diary'}</b><div class="muted" style="font-size:12px;margin-top:2px">${ar?'تسجيل يومي قصير':'quick daily log'}</div></div><b style="font-size:24px;color:var(--accent2)">${S.dsq.length?S.dsq[S.dsq.length-1].score:'—'}</b></div></div>
   <div class="card tap" onclick="openErefs()"><div class="between"><div><b>EREFS · ${ar?'درجة المنظار':'endoscopy score'}</b><div class="muted" style="font-size:12px;margin-top:2px">${ar?'سجّل نتيجة منظارك':'record your endoscopy result'}</div></div><b style="font-size:24px;color:var(--accent)">${erefs?erefs.total+'/9':'—'}</b></div>
     ${erefs?`<div class="center" style="margin-top:6px">${radar(EREFS.map(d=>erefs[d.k]||0),EREFS.map(d=>d.max),EREFS.map(d=>L(d.n)))}</div>`:''}</div>
   <div class="card tap" onclick="openEos()"><div class="between"><div><b>${ar?'عدد اليوزينيات (خزعة)':'Eosinophil count (biopsy)'}</b><div class="muted" style="font-size:12px;margin-top:2px">${ar?'الحد التشخيصي ≥ ١٥/حقل':'diagnostic ≥ 15/hpf'}</div></div><b style="font-size:24px;color:var(--rose)">${S.eos.length?S.eos[S.eos.length-1].count:'—'}</b></div>
     ${eos.length?`<div style="margin-top:10px">${barChart(eos.map(e=>e.count),eos.map(e=>fmtDate(e.date+'T00:00')),'var(--rose)',15)}</div>`:''}</div>
   <div class="card"><div class="section-title" style="margin:0 0 8px">${ar?'نشاط التسجيل (٥ أسابيع)':'Logging activity (5 weeks)'}</div>${heatmap()}</div>
  </div>`;});

let discAns={};
window.openEesai=function(){discAns={};const ar=isAr();const last=S.eesai[S.eesai.length-1];
 openSheet(`<h2 style="margin:4px 0 6px">EEsAI</h2><p class="muted" style="font-size:12px;margin:0 0 14px">${ar?'كيف كان البلع آخر ٧ أيام؟ (٠ = بلا صعوبة، ٤ = صعوبة شديدة)':'How was swallowing the last 7 days? (0 = no trouble, 4 = severe trouble)'}</p>
  <div id="eesaiForm">
   <div class="section-title" style="margin:0 0 8px">${ar?'حسب نوع الطعام':'By food type'}</div>
   ${CONSIST.map((c,i)=>`<div style="margin-bottom:12px"><div style="font-size:13px;margin-bottom:6px">${L(c)}</div><div class="scale" id="c${i}">${[0,1,2,3,4].map(v=>`<button data-v="${v}" onclick="setAns('c${i}',${v},this)">${v}</button>`).join('')}</div></div>`).join('')}
   <div class="section-title" style="margin:8px 0 8px">${ar?'سلوكيات':'Behaviours'}</div>
   ${EBEH.map((c,i)=>`<div style="margin-bottom:12px"><div style="font-size:13px;margin-bottom:6px">${L(c)}</div><div class="scale" id="b${i}">${[0,1,2,3,4].map(v=>`<button data-v="${v}" onclick="setAns('b${i}',${v},this)">${v}</button>`).join('')}</div></div>`).join('')}
  </div>
  <div class="disc-note" style="margin:8px 0 14px">${ar?'أداة تأمّل ذاتي — ليست تشخيصًا. ناقش النتيجة مع فريقك.':'A self-reflection aid — not a diagnosis. Discuss the result with your team.'}</div>
  <button class="btn btn-primary" onclick="saveEesai()">${t('save')}</button>`);};
window.setAns=(id,v,b)=>{discAns[id]=v;$('#'+id).querySelectorAll('button').forEach(x=>x.classList.remove('on'));b.classList.add('on');};
window.saveEesai=()=>{const keys=[...CONSIST.map((_,i)=>'c'+i),...EBEH.map((_,i)=>'b'+i)];const vals=keys.map(k=>discAns[k]);if(vals.some(v=>v==null))return toast(isAr()?'أكمل كل البنود':'Answer all items');const score=Math.round(vals.reduce((a,b)=>a+b,0)/(keys.length*4)*100);S.eesai.push({date:todayKey(),score,answers:{...discAns}});save();closeSheet();toast(isAr()?'تم — الدرجة '+score:'Saved — score '+score);render();};

window.openDsq=function(){const ar=isAr();openSheet(`<h2 style="margin:4px 0 14px">DSQ · ${ar?'يوميات البلع':'Dysphagia diary'}</h2>
  <div class="field"><label>${ar?'كم مرة شعرت أن الطعام بطيء أو عالق اليوم؟':'How often did food feel slow or stuck today?'}</label><div class="scale" id="dq">${[[0,ar?'أبدًا':'Never'],[1,ar?'مرة':'Once'],[2,ar?'بضع':'A few'],[3,ar?'معظم الوجبات':'Most meals'],[4,ar?'كل وجبة':'Every meal']].map(([v,l])=>`<button data-v="${v}" onclick="pickScale('dq',this)" style="font-size:11px">${l}</button>`).join('')}</div></div>
  <div class="field"><label>${ar?'هل احتجت ماءً أو تقيّأت لتمرير الطعام؟':'Did you need water or to regurgitate to clear food?'}</label><div class="chips" id="dst">${[[0,t('none')],[1,t('mild')],[2,t('severe')]].map(([v,l])=>`<button class="chip" data-v="${v}" onclick="pick('dst',this)">${l}</button>`).join('')}</div></div>
  <button class="btn btn-primary" onclick="saveDsq()">${t('save')}</button>`);};
window.saveDsq=()=>{const f=$('#dq'),st=$('#dst');if(f.dataset.val==null)return toast(isAr()?'أجب':'Answer first');const freq=+f.dataset.val,stuck=st.dataset.val!=null?+st.dataset.val:0;S.dsq.push({date:todayKey(),freq,stuck,score:freq*20});save();closeSheet();toast(t('saved'));render();};

window.openErefs=function(){const ar=isAr();openSheet(`<h2 style="margin:4px 0 6px">EREFS</h2><p class="muted" style="font-size:12px;margin:0 0 14px">${ar?'انسخ الدرجات من تقرير منظارك (يسجّلها الطبيب).':'Copy the scores from your endoscopy report (graded by your doctor).'}</p>
  ${EREFS.map(d=>`<div class="field"><label>${L(d.n)} (0–${d.max})</label><div class="scale" id="er_${d.k}">${Array.from({length:d.max+1}).map((_,v)=>`<button data-v="${v}" onclick="pickScale('er_${d.k}',this)">${v}</button>`).join('')}</div></div>`).join('')}
  <button class="btn btn-primary" onclick="saveErefs()">${t('save')}</button>`);};
window.saveErefs=()=>{const o={date:todayKey()};let tot=0,ok=true;EREFS.forEach(d=>{const e=$('#er_'+d.k);if(e.dataset.val==null)ok=false;else{o[d.k]=+e.dataset.val;tot+=o[d.k];}});if(!ok)return toast(isAr()?'أكمل كل البنود':'Fill all items');o.total=tot;S.erefs.push(o);save();closeSheet();toast(isAr()?'تم — '+tot+'/9':'Saved — '+tot+'/9');render();};

window.openEos=function(){const ar=isAr();openSheet(`<h2 style="margin:4px 0 14px">${ar?'عدد اليوزينيات':'Eosinophil count'}</h2>
  <div class="field"><label>${ar?'الذروة (خلايا/حقل عالي القوة)':'Peak (eosinophils per high-power field)'}</label><input class="input" id="eosc" inputmode="numeric" placeholder="e.g. 22"></div>
  <div class="field"><label>${ar?'التاريخ':'Date'}</label><input class="input" id="eosd" type="date" value="${todayKey()}"></div>
  <div class="disc-note">${ar?'≥ ١٥ خلية/حقل عادةً ما يدعم التشخيص؛ الهدف من العلاج غالبًا < ١٥ أو ≤ ٦.':'≥ 15/hpf usually supports the diagnosis; the treatment target is often < 15 or ≤ 6.'}</div>
  <button class="btn btn-primary" style="margin-top:14px" onclick="saveEos()">${t('save')}</button>`);};
window.saveEos=()=>{const c=parseInt($('#eosc').value,10);if(isNaN(c))return toast(isAr()?'أدخل رقمًا':'Enter a number');S.eos.push({date:$('#eosd').value||todayKey(),count:c});S.eos.sort((a,b)=>a.date<b.date?-1:1);save();closeSheet();toast(t('saved'));render();};

/* ---- LEARN tab ---- */
let learnCat='all';
route('learn',(n)=>{const ar=isAr();const items=ART.filter(a=>learnCat==='all'||a.cat===learnCat);
  n.innerHTML=`${topbar('learnT','learnSub')}<div class="content">
   <div class="chips" style="overflow-x:auto;flex-wrap:nowrap">${Object.keys(CATS).map(c=>`<button class="chip ${learnCat===c?'on':''}" style="white-space:nowrap" onclick="setCat('${c}')">${L(CATS[c])}</button>`).join('')}</div>
   <div class="card">${items.map(a=>`<div class="li" onclick="openArticle('${a.id}')"><div class="ic">${a.icon}</div><div class="tx"><b>${L(a.t)}</b><small>${a.min} ${t('minRead')} · ${L(CATS[a.cat])}</small></div><div class="chev">${ar?'‹':'›'}</div></div>`).join('')}</div>
  </div>`;});
window.setCat=c=>{learnCat=c;render();};
window.openArticle=function(id){const a=ART.find(x=>x.id===id);if(!a)return;CURRENT_OPTS={a};go('article',{a});};
route('article',(n,o)=>{const a=o.a;if(!a)return navTab('learn');n.innerHTML=`${topbar(null,null,{back:true,rawTitle:L(a.t)})}<div class="content"><div class="card"><div style="font-size:40px;text-align:center;margin-bottom:8px">${a.icon}</div><p style="font-size:15px;line-height:1.8;white-space:pre-wrap;margin:0">${L(a.body)}</p></div><div class="disc-note">${isAr()?'محتوى تثقيفي عام — ليس نصيحة طبية فردية. استشر فريقك.':'General education — not individual medical advice. Consult your team.'}</div></div>`;});

/* ---- MORE tab ---- */
route('more',(n)=>{const ar=isAr();n.innerHTML=`${topbar('moreT')}<div class="content">
   <div class="card" style="text-align:center;padding:22px"><div class="logo-mark" style="width:64px;height:64px;font-size:30px;margin:0 auto 10px">م</div><b style="font-size:16px">${S.user.name?esc(S.user.name):'Maeen'}</b><div class="muted" style="font-size:12.5px">${t('tagline')}</div></div>
   <div class="card">
     ${mLi('💊',ar?'علاجي وحميتي':'My treatment & diet','go(\'treatment\')')}
     ${mLi('🫁',ar?'حالات تحسّسية مرافقة':'Allergic conditions','go(\'atopy\')')}
     ${mLi('📤',t('share'),'doShare()')}
   </div>
   <div class="section-title">${ar?'الإعدادات':'Settings'}</div>
   <div class="card">
     ${mLi('🌓',t('theme'),'toggleTheme()',S.prefs.theme==='light'?(ar?'فاتح':'Light'):(ar?'داكن':'Dark'))}
     ${mLi('🌐',t('language'),'toggleLangQuick()',isAr()?'العربية':'English')}
     ${mLi('ℹ️',t('about'),'go(\'about\')')}
   </div>
   <div class="section-title">${ar?'البيانات':'Data'}</div>
   <div class="card">
     ${mLi('⬇️',t('export'),'doExport()')}
     ${mLi('🗑️',t('del'),'confirmDelete()')}
   </div>
   <p class="center muted" style="font-size:11px;margin-top:6px">Maeen · معين — Saudi Gastroenterology Association</p>
  </div>`;});
function mLi(ic,lab,onclick,right){return `<div class="li" style="cursor:pointer" onclick="${onclick}"><div class="ic">${ic}</div><div class="tx"><b>${lab}</b></div>${right?`<small class="muted">${right}</small>`:''}<div class="chev">${isAr()?'‹':'›'}</div></div>`;}
window.toggleTheme=()=>{S.prefs.theme=S.prefs.theme==='light'?'dark':'light';save();render();};

route('treatment',(n)=>{const ar=isAr();n.innerHTML=`${topbar(null,null,{back:true,rawTitle:ar?'علاجي وحميتي':'My treatment & diet'})}<div class="content">
   <div class="section-title">${ar?'أدويتي الحالية':'My current medications'}</div>
   <div class="card">${MEDS.map(m=>`<div class="li"><div class="ic">💊</div><div class="tx"><b>${L(m.n)}</b><small>${L(m.note)}</small></div><button class="chip ${S.meds.includes(m.id)?'on':''}" onclick="toggleMed('${m.id}')">${S.meds.includes(m.id)?(ar?'مفعّل':'On'):(ar?'إضافة':'Add')}</button></div>`).join('')}</div>
   <div class="section-title">${ar?'حميتي العلاجية':'My diet therapy'}</div>
   <div class="card"><div class="chips">${DIETS.map((d,i)=>`<button class="chip ${S.diet===String(i)?'on':''}" onclick="setDiet(${i})">${L(d)}</button>`).join('')}</div></div>
   <div class="disc-note">${ar?'سجّل ما وصفه طبيبك فقط. لا تبدأ أو توقف علاجًا دون استشارته.':'Record only what your doctor prescribed. Do not start or stop any treatment without them.'}</div>
  </div>`;});
window.toggleMed=(id)=>{const i=S.meds.indexOf(id);if(i<0)S.meds.push(id);else S.meds.splice(i,1);save();render();};
window.setDiet=(i)=>{S.diet=String(i);save();render();};

route('atopy',(n)=>{const ar=isAr();n.innerHTML=`${topbar(null,null,{back:true,rawTitle:ar?'حالات تحسّسية مرافقة':'Allergic conditions'})}<div class="content">
   <div class="disc-note">${ar?'يرتبط التهاب المريء اليوزيني غالبًا بحالات تحسّسية أخرى. تتبّعها مع فريقك.':'EoE is often linked with other allergic conditions. Track them with your team.'}</div>
   <div class="card"><div class="chips">${ATOPY.map((a,i)=>`<button class="chip ${S.atopy['a'+i]?'on':''}" onclick="toggleAtopy(${i})">${L(a)}</button>`).join('')}</div></div>
  </div>`;});
window.toggleAtopy=(i)=>{S.atopy['a'+i]=!S.atopy['a'+i];save();render();};

route('about',(n)=>{n.innerHTML=`${topbar(null,null,{back:true,rawTitle:t('about')})}<div class="content"><div class="card"><p style="font-size:14px;line-height:1.75;white-space:pre-wrap;margin:0">${t('consentBody')}</p></div></div>`;});

/* ---- share / export / delete ---- */
window.doShare=function(){const ar=isAr();const e=S.eesai[S.eesai.length-1],er=S.erefs[S.erefs.length-1],eo=S.eos[S.eos.length-1];
 const lines=[
  (ar?'ملخّص Maeen (للقراءة فقط):':'Maeen summary (read-only):'),
  (ar?'الاسم: ':'Name: ')+(S.user.name||'—'),
  'EEsAI: '+(e?e.score+'/100 ('+e.date+')':'—'),
  'DSQ: '+(S.dsq.length?S.dsq[S.dsq.length-1].score+'/100':'—'),
  'EREFS: '+(er?er.total+'/9 ('+er.date+')':'—'),
  (ar?'اليوزينيات: ':'Eos: ')+(eo?eo.count+'/hpf ('+eo.date+')':'—'),
  (ar?'الحمية: ':'Diet: ')+(S.diet!==''?L(DIETS[+S.diet]):'—'),
  (ar?'سجلات آخر ١٤ يومًا: ':'Logs (14d): ')+S.logs.filter(l=>daysAgo(l.t.slice(0,10))<=14).length
 ].join('\n');
 openSheet(`<h2 style="margin:4px 0 12px">📤 ${t('share')}</h2><div class="card" style="background:var(--card2)"><pre style="white-space:pre-wrap;font-size:12.5px;margin:0;font-family:inherit;color:var(--txt)">${esc(lines)}</pre></div>
  <button class="btn btn-primary" style="margin-top:14px" onclick="copyShare()">${ar?'نسخ الملخّص':'Copy summary'}</button>
  ${navigator.share?`<button class="btn btn-ghost" style="margin-top:10px" onclick="navigator.share({title:'Maeen',text:document.getElementById('shareTxt').value})">${ar?'مشاركة':'Share'}</button>`:''}
  <textarea id="shareTxt" style="position:absolute;left:-9999px">${esc(lines)}</textarea>
  <div class="disc-note" style="margin-top:12px">${ar?'بيانات يبلّغ عنها المريض، وصفية فقط، ليست تشخيصًا — كمحفّز للنقاش أثناء الزيارة.':'Patient-reported, descriptive only, not a diagnosis — a conversation aid for your visit.'}</div>`);};
window.copyShare=()=>{const v=$('#shareTxt').value;if(navigator.clipboard)navigator.clipboard.writeText(v);toast(isAr()?'نُسخ':'Copied');};
window.doExport=()=>{const blob=new Blob([JSON.stringify(S,null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='maeen-eoe-'+todayKey()+'.json';a.click();toast(isAr()?'تم التصدير':'Exported');};
window.confirmDelete=()=>{openSheet(`<div style="text-align:center;font-size:40px">⚠️</div><h2 style="text-align:center;font-size:18px">${t('del')}</h2><p class="muted center" style="font-size:13px">${isAr()?'سيُحذف كل ما سجّلته على هذا الجهاز. لا يمكن التراجع.':'This permanently clears everything you logged on this device.'}</p><button class="btn btn-danger" onclick="reallyDelete()">${isAr()?'حذف نهائي':'Delete everything'}</button><button class="btn btn-ghost" style="margin-top:10px" onclick="closeSheet()">${t('cancel')}</button>`);};
window.reallyDelete=()=>{const lang=S.lang,theme=S.prefs.theme;S=blank();S.lang=lang;S.onboarded=true;S.prefs.theme=theme;save();closeSheet();toast(isAr()?'تم الحذف':'Deleted');navTab('today');};

/* ---------- boot ---------- */
window.navTab=navTab;window.go=go;window.goBack=goBack;window.closeSheet=closeSheet;
applyDir();
go('splash',{replace:true});
</script>
</body>
</html>
