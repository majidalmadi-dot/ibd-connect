<style>

}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{margin:0;background:var(--bg);color:var(--txt);

html[dir=rtl] body{font-family:'IBM Plex Sans Arabic','Segoe UI',Tahoma,Arial,sans-serif;letter-spacing:normal}

@media(min-width:480px){#app{margin:0 auto;box-shadow:0 0 60px rgba(0,0,0,.5);border-left:1px solid var(--line);border-right:1px solid var(--line)}}

.screen.active{display:flex}
.screen::-webkit-scrollbar{width:0}

.spacer{flex:1}

.sheet-bg.open{display:flex}
.sheet{width:100%;max-height:90%;overflow-y:auto;background:var(--bg2);border-radius:24px 24px 0 0;border-top:1px solid var(--line);padding:10px 18px calc(28px + env(safe-area-inset-bottom));animation:up .3s cubic-bezier(.2,.8,.2,1)}

.toast{position:absolute;bottom:96px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--card2);border:1px solid var(--accent);color:var(--txt);padding:12px 20px;border-radius:14px;font-size:14px;font-weight:600;z-index:80;opacity:0;transition:.3s;box-shadow:var(--sh);pointer-events:none;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.pbar{height:7px;border-radius:6px;background:var(--bg2);overflow:hidden}
.pbar i{display:block;height:100%;border-radius:6px;background:linear-gradient(90deg,var(--accent),var(--accent2))}
.badge{display:inline-block;padding:3px 9px;border-radius:8px;font-size:10.5px;font-weight:700}
.badge.accent{background:var(--accent-d);color:var(--accent)}
.splash{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;text-align:center;padding:30px;background:radial-gradient(120% 80% at 50% 0%,#241b45 0%,var(--bg) 55%)}
.logo-mark{width:92px;height:92px;border-radius:27px;display:flex;align-items:center;justify-content:center;font-size:44px;font-weight:800;color:#fff;background:linear-gradient(140deg,var(--accent),var(--accent2));box-shadow:0 20px 50px rgba(155,124,255,.35)}
.disc-note{background:var(--card2);border-radius:12px;padding:11px 13px;font-size:11.5px;color:var(--muted);line-height:1.55}
.center{text-align:center}.muted{color:var(--muted)}.row{display:flex;align-items:center}.between{display:flex;align-items:center;justify-content:space-between}
.empty-art{width:84px;height:84px;margin:2px auto 8px;color:var(--accent);opacity:.9}
.empty-art svg{width:100%;height:100%}
a{color:var(--accent2)}
/* ===== premium polish layer — best-app finishing touches ===== */
:root{--ease-spring:cubic-bezier(.34,1.4,.5,1)}
html{scroll-behavior:smooth}
::selection{background:color-mix(in srgb,var(--accent) 30%,transparent)}
:focus-visible{outline:2px solid var(--accent);outline-offset:2px;border-radius:10px}
button:focus:not(:focus-visible),a:focus:not(:focus-visible){outline:none}
.btn{transition:transform .18s var(--ease-spring),box-shadow .2s ease,background .2s ease,filter .2s ease}
.btn:active{transform:scale(.965)}
.btn-primary{box-shadow:0 10px 24px -12px color-mix(in srgb,var(--accent) 60%,transparent)}
.chip{transition:transform .18s var(--ease-spring),background .18s ease,color .18s ease,border-color .18s ease}
.chip:active,.li:active,.scale button:active{transform:scale(.96)}
.card.tap:active{transform:scale(.975)}
.iconbtn{transition:transform .16s var(--ease-spring)}
.iconbtn:active{transform:scale(.9)}
.tab:active .ic{transform:scale(.86)}
@media (hover:hover) and (pointer:fine){
  .card.tap:hover{transform:translateY(-2px)}
  .pathcard:hover{transform:translateY(-2px)}

  .btn:hover{filter:brightness(1.05)}
}
.sheet-bg{backdrop-filter:blur(3px)}
.sheet{box-shadow:0 -12px 40px -18px rgba(0,0,0,.5)}
.toast{transition:opacity .28s ease, transform .3s var(--ease-spring);display:flex;align-items:center;justify-content:center}
.toast.ok{border-color:var(--good)}
.tst-check{display:inline-flex;align-items:center;justify-content:center;width:19px;height:19px;border-radius:50%;background:var(--good);color:#fff;font-size:12px;font-weight:800;margin-inline-end:8px;flex:none;animation:tstPop .5s var(--ease-spring)}
@keyframes tstPop{0%{transform:scale(0) rotate(-30deg)}60%{transform:scale(1.25) rotate(4deg)}100%{transform:scale(1) rotate(0)}}

  ::-webkit-scrollbar-track{background:transparent}
}
@media (prefers-reduced-motion:reduce){html{scroll-behavior:auto}.btn:active,.chip:active,.card.tap:active,.iconbtn:active,.card.tap:hover,.pathcard:hover{transform:none}}
</style>

<script>

const $=(s,r)=>(r||document).querySelector(s);

const KEY='maeen_eoe_v1';

/* ---------- i18n ---------- */
const I18N={
  appName:{en:'Maeen',ar:'معين'},tagline:{en:'your EoE companion',ar:'رفيقك مع التهاب المريء اليوزيني'},
  getStarted:{en:'Get started',ar:'لنبدأ'},chooseLang:{en:'Choose your language',ar:'اختر لغتك'},continue:{en:'Continue',ar:'متابعة'},

  consentT:{en:'Before we start',ar:'قبل أن نبدأ'},
  consentBody:{en:"Maeen is a non-medical health companion for eosinophilic esophagitis (EoE). It helps you record symptoms, triggers, diet and treatment, see descriptive trends, and learn.\n\nIt does NOT provide medical advice, diagnosis, predictions, or treatment recommendations, and is not a medical device. All scores and charts are descriptive only.\n\nAlways consult your healthcare provider for any medical decision. If food is stuck and you cannot swallow your own saliva, or you have chest pain or trouble breathing, seek urgent care.",ar:"معين رفيق صحي غير طبي لالتهاب المريء اليوزيني. يساعدك على تسجيل الأعراض والمحفّزات والغذاء والعلاج، ورؤية اتجاهات وصفية، والتعلّم.\n\nلا يقدّم نصيحة طبية أو تشخيصًا أو تنبؤًا أو توصيات علاجية، وليس جهازًا طبيًا. كل الدرجات والرسوم وصفية فقط.\n\nاستشر دائمًا مقدّم الرعاية الصحية. إذا انحشر الطعام ولم تستطع بلع ريقك، أو شعرت بألم في الصدر أو صعوبة تنفّس، اطلب رعاية عاجلة."},
  yourName:{en:'Your name',ar:'اسمك'},namePh:{en:'e.g. Sara',ar:'مثال: سارة'},
  tabToday:{en:'Today',ar:'اليوم'},tabTrack:{en:'Track',ar:'تتبّع'},tabScores:{en:'Scores',ar:'الدرجات'},tabLearn:{en:'Learn',ar:'تعلّم'},tabMore:{en:'More',ar:'المزيد'},
  goodMorning:{en:'Good morning',ar:'صباح الخير'},goodAfternoon:{en:'Good afternoon',ar:'مساء الخير'},goodEvening:{en:'Good evening',ar:'مساء الخير'},
  checkinT:{en:'Daily check-in',ar:'تسجيل اليوم'},checkinSub:{en:'How was swallowing today?',ar:'كيف كان البلع اليوم؟'},
  quickLog:{en:'Quick log',ar:'تسجيل سريع'},
  logDysphagia:{en:'Dysphagia',ar:'صعوبة بلع'},logImpaction:{en:'Food stuck',ar:'انحشار طعام'},logMeal:{en:'Meal / trigger',ar:'وجبة / محفّز'},logReflux:{en:'Reflux',ar:'ارتجاع'},logAdapt:{en:'Eating tactic',ar:'حيلة أكل'},logMed:{en:'Medication',ar:'دواء'},
  recent:{en:'Recent activity',ar:'النشاط الأخير'},noLogs:{en:'No entries yet — tap a quick-log button to start.',ar:'لا سجلات بعد — اضغط زر تسجيل سريع للبدء.'},
  streak:{en:'day streak',ar:'يوم متتابع'},
  trackT:{en:'Track',ar:'تتبّع'},trackSub:{en:'Log symptoms, food and treatment',ar:'سجّل الأعراض والطعام والعلاج'},

  minRead:{en:'min read',ar:'دقيقة قراءة'},
  none:{en:'None',ar:'لا شيء'},mild:{en:'Mild',ar:'خفيف'},moderate:{en:'Moderate',ar:'متوسط'},severe:{en:'Severe',ar:'شديد'},
  export:{en:'Export my data',ar:'تصدير بياناتي'},del:{en:'Delete my data',ar:'حذف بياناتي'},
  theme:{en:'Theme',ar:'المظهر'},language:{en:'Language',ar:'اللغة'},about:{en:'About & disclaimer',ar:'حول وإخلاء المسؤولية'},share:{en:'Share with my doctor',ar:'مشاركة مع طبيبي'},

function isAr(){return S.lang==='ar';}

/* ---------- EoE domain data ---------- */
// Eating-difficulty by food consistency (EEsAI-style, descriptive 0-4 impact)
const CONSIST=[['Soft foods (yogurt, eggs)','أطعمة طريّة (زبادي، بيض)'],['Solid meat / chicken','لحوم / دجاج صلبة'],['Rice / bread','أرز / خبز'],['Raw vegetables / fruit','خضار / فواكه نيئة'],['Dry / crumbly (biscuit)','جافّة / متفتّتة (بسكويت)'],['Tablets / pills','أقراص / حبوب']];
// EEsAI behaviour items
const EBEH=[['I avoided certain foods','تجنّبت أطعمة معيّنة'],['I changed how I prepared food (cut small, sauce)','غيّرت طريقة التحضير (تقطيع، صلصة)'],['I ate more slowly than others','أكلت أبطأ من غيري'],['I drank fluids to wash food down','شربت سوائل لتمرير الطعام']];
// Six-food elimination triggers (+common others)
const TRIGGERS=[['Milk / dairy','حليب / ألبان'],['Wheat / gluten','قمح / غلوتين'],['Egg','بيض'],['Soy / legumes','صويا / بقوليات'],['Nuts / peanuts','مكسّرات / فول سوداني'],['Fish / shellfish','سمك / محار'],['Beef / lamb','لحم بقر / غنم'],['Other','أخرى']];
// Eating adaptations (IMPACT coping behaviours)
const ADAPT=[['Cut food into small pieces','قطّعت الطعام لقطع صغيرة'],['Chewed very thoroughly','مضغت جيدًا جدًا'],['Drank to wash food down','شربت لتمرير الطعام'],['Avoided hard / dry foods','تجنّبت الأطعمة الصلبة/الجافة'],['Ate slowly','أكلت ببطء'],['Used sauces / lubrication','استخدمت الصلصات للترطيب']];
// Treatments — the "3 D's"
const MEDS=[
 {id:'ppi',n:['Proton-pump inhibitor (PPI)','مثبّط مضخة البروتون'],note:['e.g. omeprazole, esomeprazole','مثل أوميبرازول، إيزوميبرازول']},
 {id:'budesonide',n:['Swallowed budesonide','بوديزونيد مبلوع'],note:['Swallow, then no food/drink 30 min','ابلع، ثم لا طعام/شراب ٣٠ دقيقة']},
 {id:'fluticasone',n:['Swallowed fluticasone','فلوتيكازون مبلوع'],note:['Spray & swallow, then no food/drink 30 min','رُذّ وابلع، ثم لا طعام/شراب ٣٠ دقيقة']},
 {id:'dupilumab',n:['Dupilumab (biologic injection)','دوبيلوماب (حقنة حيوية)'],note:['Usually weekly','عادة أسبوعيًا']},
];
const DIETS=[['No diet therapy','بدون حمية علاجية'],['Six-food elimination','حذف الأطعمة الستة'],['Four-food elimination','حذف الأطعمة الأربعة'],['One-food (milk) elimination','حذف غذاء واحد (الحليب)'],['Elemental diet','حمية عنصرية'],['Reintroduction phase','مرحلة إعادة الإدخال']];

const ART=[
 {id:'march',icon:'🌿',cat:'basics',min:4,t:['EoE and the allergic march','المرض والمسيرة التحسّسية'],body:['EoE is an allergic condition and rarely travels alone. Many people with EoE also have asthma, eczema, hay fever (allergic rhinitis) or food allergies — a pattern doctors call the atopic march, where allergic conditions appear across a lifetime. This is why your team may ask about these conditions and involve an allergist. Managing your other allergies well can support your overall care, and understanding the link helps make sense of your diagnosis. It does not mean one condition caused the other — they share an underlying allergic tendency.','التهاب المريء اليوزيني حالة تحسّسية ونادرًا ما يأتي وحده. كثير من المصابين لديهم أيضًا ربو أو إكزيما أو حساسية أنف أو حساسية غذائية — نمط يسمّيه الأطباء «المسيرة التحسّسية» حيث تظهر الحالات التحسّسية عبر العمر. لذا قد يسأل فريقك عن هذه الحالات ويشرك طبيب حساسية. إدارة حساسياتك الأخرى جيدًا تدعم رعايتك العامة، وفهم الارتباط يوضّح تشخيصك. لا يعني ذلك أن حالة سبّبت الأخرى — بل تشتركان في ميل تحسّسي كامن.']},
 {id:'dupi',icon:'💉',cat:'treatment',min:4,t:['Dupilumab explained','شرح دوبيلوماب'],body:['Dupilumab is a biologic — an injectable medicine that blocks part of the allergic-inflammation pathway (interleukin signalling) that drives EoE. It is approved for eosinophilic esophagitis and is usually given as a regular injection under the skin, often weekly. It may be used when other treatments have not worked well, or as an option your doctor considers based on your case. Like any medicine it has possible side effects — most commonly injection-site reactions — which your team will discuss. Never start, stop or change a biologic without your doctor, and keep your follow-up appointments.','دوبيلوماب علاج حيوي — دواء يُحقن يحجب جزءًا من مسار الالتهاب التحسّسي (إشارات الإنترلوكين) المسبّب للمرض. معتمد لالتهاب المريء اليوزيني ويُعطى عادة حقنة منتظمة تحت الجلد، غالبًا أسبوعيًا. قد يُستخدم عندما لا تنجح العلاجات الأخرى جيدًا، أو كخيار يدرسه طبيبك حسب حالتك. وكأي دواء له آثار محتملة — أشيعها تفاعلات موضع الحقن — يناقشها فريقك. لا تبدأ أو توقف أو تغيّر علاجًا حيويًا دون طبيبك، وحافظ على مواعيد متابعتك.']},
 {id:'report',icon:'📄',cat:'diagnosis',min:4,t:['Understanding your endoscopy report','فهم تقرير المنظار'],body:['After an upper endoscopy your report may mention what the doctor saw and what the biopsies showed. Visual findings are often summarised with EREFS — Edema, Rings, Exudates, Furrows and Strictures — which describe how the esophagus looks. The biopsy result gives the peak eosinophil count per high-power field (hpf); 15 or more usually supports an EoE diagnosis, and treatment often aims to bring it well below that. You can record both your EREFS scores and eosinophil counts in the Scores tab to watch them improve over time. Ask your team to walk you through your own report — it is your best guide to whether treatment is working.','بعد المنظار العلوي قد يذكر تقريرك ما رآه الطبيب وما أظهرته الخزعات. تُلخَّص المشاهدات غالبًا بـEREFS — وذمة، حلقات، إفرازات، أخاديد، تضيّق — تصف مظهر المريء. وتعطي الخزعة ذروة عدد الحمضات لكل حقل مجهري عالي القوة؛ و١٥ فأكثر يدعم عادة التشخيص، ويهدف العلاج غالبًا لخفضه دون ذلك بكثير. يمكنك تسجيل درجات EREFS وعدد الحمضات في تبويب الدرجات لمتابعة تحسّنها. اطلب من فريقك شرح تقريرك — فهو أفضل دليل على نجاح العلاج.']},
 {id:'travel',icon:'✈️',cat:'living',min:3,t:['Eating out & travel with EoE','الأكل خارجًا والسفر مع المرض'],body:['Restaurants and travel take extra planning when foods can stick or trigger symptoms. Choose moist, tender dishes, ask how food is prepared, and if you follow an elimination diet, ask about ingredients and hidden triggers such as milk or wheat. Eat slowly, cut food small, keep a drink handy, and never rush a meal in a busy place. Carry your medications and, when travelling, a note about your condition and a plan for what to do if food gets stuck. Knowing where the nearest care is abroad brings peace of mind.','المطاعم والسفر يحتاجان تخطيطًا إضافيًا حين قد ينحشر الطعام أو يثير الأعراض. اختر أطباقًا رطبة طريّة، واسأل عن طريقة التحضير، وإن اتّبعت حمية إقصاء فاسأل عن المكوّنات والمحفّزات الخفية كالحليب أو القمح. كُل ببطء، وقطّع صغيرًا، وأبقِ مشروبًا قريبًا، ولا تتعجّل وجبة في مكان مزدحم. احمل أدويتك، وعند السفر ورقة بحالتك وخطة لما تفعله إن انحشر الطعام. ومعرفة أقرب رعاية بالخارج تمنحك راحة البال.']},
 {id:'nourish',icon:'🥦',cat:'diet',min:4,t:['Staying nourished on elimination diets','التغذية الجيدة في حميات الإقصاء'],body:['Removing foods to calm EoE works best when the rest of your diet stays complete and enjoyable. Milk, wheat, egg, soy, nuts and fish are common eliminations — and each can be replaced: fortified plant milks and other calcium sources for dairy, gluten-free grains for wheat, and beans, poultry or fish for protein where allowed. A dietitian is invaluable here, especially for children, to protect calcium, vitamin D, iron and overall growth. Plan meals and read labels so restriction never means poor nutrition. The goal is the fewest restrictions that keep you well — not endless avoidance.','إزالة الأطعمة لتهدئة المرض تنجح أكثر حين يبقى باقي غذائك كاملًا وممتعًا. الحليب والقمح والبيض والصويا والمكسّرات والسمك من الإقصاءات الشائعة — ولكلٍّ بديل: حليب نباتي مدعّم ومصادر كالسيوم أخرى للألبان، وحبوب خالية من الغلوتين للقمح، والبقوليات أو الدواجن أو السمك للبروتين حيث يُسمح. أخصائي التغذية لا يُقدَّر بثمن هنا، خاصة للأطفال، لحماية الكالسيوم وفيتامين د والحديد والنمو. خطّط الوجبات واقرأ الملصقات كي لا يعني التقييد سوء تغذية. الهدف أقل القيود التي تُبقيك بخير — لا التجنّب اللانهائي.']},
 {id:'what',icon:'📘',cat:'basics',min:4,t:['What is EoE?','ما هو التهاب المريء اليوزيني؟'],body:[
   "Eosinophilic esophagitis (EoE) is a chronic, allergic/immune condition where a type of white blood cell — the eosinophil — builds up in the lining of the esophagus (the food pipe). This inflammation makes the esophagus stiff and narrow, so food can move slowly or get stuck.\n\nEoE is often linked with other allergic conditions such as asthma, eczema and hay fever. It is a long-term condition that is managed, not cured — but with the right treatment most people swallow comfortably again.",
   "التهاب المريء اليوزيني حالة مناعية/تحسّسية مزمنة تتراكم فيها خلية دم بيضاء (اليوزيني/الحمضات) في بطانة المريء (أنبوب الطعام). يجعل هذا الالتهاب المريء متيبّسًا وضيّقًا، فيتحرّك الطعام ببطء أو ينحشر.\n\nيرتبط غالبًا بحالات تحسّسية أخرى كالربو والإكزيما وحساسية الأنف. حالة مزمنة تُدار ولا تُشفى تمامًا — ومع العلاج المناسب يعود معظم الناس للبلع بارتياح."]},
 {id:'symptoms',icon:'🔎',cat:'basics',min:3,t:['Symptoms & red flags','الأعراض والعلامات التحذيرية'],body:[
   "In adults and teens the most common symptom is dysphagia — food feeling slow or stuck when swallowing. People often adapt without realising: cutting food small, chewing a lot, drinking to wash food down, or avoiding dry/tough foods.\n\nOther symptoms: chest or upper-tummy pain, heartburn that does not settle, regurgitation. In young children: feeding difficulty, vomiting, poor weight gain.\n\nRED FLAG — food impaction: if food is stuck and will not pass, and especially if you cannot swallow your own saliva, this is an emergency. Seek urgent care.",
   "لدى البالغين والمراهقين أكثر عَرَض شيوعًا هو عُسر البلع — الإحساس ببطء الطعام أو انحشاره عند البلع. يتأقلم الناس دون أن يدركوا: تقطيع الطعام صغيرًا، المضغ كثيرًا، الشرب لتمريره، أو تجنّب الجاف/القاسي.\n\nأعراض أخرى: ألم بالصدر أو أعلى البطن، حُرقة لا تهدأ، قَلَس. لدى الأطفال الصغار: صعوبة تغذية، قيء، ضعف اكتساب وزن.\n\nعلامة خطر — انحشار الطعام: إذا انحشر الطعام ولم يمرّ، خاصة إن لم تستطع بلع ريقك، فهذه حالة طارئة. اطلب رعاية عاجلة."]},
 {id:'diagnosis',icon:'🩺',cat:'diagnosis',min:4,t:['How EoE is diagnosed','كيف يُشخَّص المرض'],body:[
   "EoE is diagnosed with an upper endoscopy (a thin camera) plus biopsies (tiny tissue samples). Two things are needed: symptoms of esophageal dysfunction, and at least 15 eosinophils per high-power field (eos/hpf) on biopsy, after other causes are excluded.\n\nDuring endoscopy the doctor scores what they see using EREFS — Edema, Rings, Exudates, Furrows and Strictures. Several biopsies are taken from different levels. You can record your biopsy eosinophil count and EREFS in the Scores tab to watch them over time.",
   "يُشخَّص بالمنظار العلوي (كاميرا دقيقة) مع أخذ خزعات (عيّنات نسيج صغيرة). يلزم أمران: أعراض خلل وظيفي بالمريء، ووجود ١٥ خلية يوزينية على الأقل لكل حقل مجهري عالي القوة في الخزعة، بعد استبعاد الأسباب الأخرى.\n\nأثناء المنظار يسجّل الطبيب ما يراه عبر EREFS — وذمة، حلقات، إفرازات، أخاديد، تضيّق. تُؤخذ عدة خزعات من مستويات مختلفة. يمكنك تسجيل عدد اليوزينيات وEREFS في تبويب الدرجات لمتابعتها."]},
 {id:'treat',icon:'💊',cat:'treatment',min:5,t:["The 3 D's: Drugs, Diet, Dilation","العلاجات الثلاثة: الدواء، الحمية، التوسيع"],body:[
   "EoE treatment rests on three pillars — the “3 D’s”:\n\n• DRUGS — proton-pump inhibitors (PPIs); swallowed topical steroids (budesonide or fluticasone) that coat the esophagus; and dupilumab, a biologic injection. Your doctor chooses based on your case.\n\n• DIET — removing trigger foods (most often milk, wheat, egg, soy, nuts, fish/shellfish) to calm inflammation, then carefully reintroducing them to find your triggers.\n\n• DILATION — gently stretching a narrowed esophagus during endoscopy if a stricture is causing food to stick.\n\nTreatment is long-term: when it stops, inflammation usually returns, so follow-up matters.",
   "يقوم العلاج على ثلاثة أعمدة — «العلاجات الثلاثة»:\n\n• الدواء — مثبّطات مضخة البروتون؛ ستيرويدات موضعية مبلوعة (بوديزونيد أو فلوتيكازون) تغلّف المريء؛ ودوبيلوماب، حقنة حيوية. يختار طبيبك حسب حالتك.\n\n• الحمية — إزالة الأطعمة المحفّزة (غالبًا الحليب، القمح، البيض، الصويا، المكسّرات، السمك/المحار) لتهدئة الالتهاب، ثم إعادتها بحذر لتحديد محفّزاتك.\n\n• التوسيع — توسيع لطيف للمريء الضيّق أثناء المنظار إن كان التضيّق يسبّب انحشار الطعام.\n\nالعلاج طويل الأمد: عند إيقافه يعود الالتهاب عادة، لذا المتابعة مهمّة."]},
 {id:'meds',icon:'💉',cat:'treatment',min:4,t:['Medications explained','شرح الأدوية'],body:[
   "PPIs reduce acid and, in many people, also calm esophageal inflammation.\n\nSwallowed topical steroids (budesonide, fluticasone) are designed to coat the esophagus, not go to the lungs. Take them as directed and then avoid eating or drinking for about 30 minutes so the medicine stays in contact. Rinse your mouth to lower the chance of oral thrush.\n\nDupilumab is a biologic injection (often weekly) that blocks part of the allergic pathway; it is approved for EoE. Diet therapy can be used instead of, or alongside, medicines. Never start, stop or change a treatment without your doctor.",
   "تقلّل مثبّطات مضخة البروتون الحمض، وتهدّئ لدى كثيرين التهاب المريء أيضًا.\n\nالستيرويدات الموضعية المبلوعة (بوديزونيد، فلوتيكازون) مصمّمة لتغليف المريء لا للوصول للرئتين. تناولها حسب التعليمات ثم تجنّب الأكل أو الشرب نحو ٣٠ دقيقة ليبقى الدواء ملامسًا. اشطف فمك لتقليل احتمال فطريات الفم.\n\nدوبيلوماب حقنة حيوية (غالبًا أسبوعيًا) تحجب جزءًا من المسار التحسّسي؛ معتمد للمرض. يمكن استخدام الحمية بدلًا من الأدوية أو معها. لا تبدأ أو توقف أو تغيّر علاجًا دون طبيبك."]},
 {id:'diet',icon:'🥗',cat:'diet',min:5,t:['Elimination diets','حِميات الإقصاء'],body:[
   "Diet therapy removes foods that drive the inflammation. The classic approach removes six common triggers — milk, wheat, egg, soy, nuts, and fish/shellfish (the “six-food elimination diet”). Some start smaller (one- or four-food) and step up only if needed.\n\nAfter the esophagus heals on repeat endoscopy, foods are reintroduced one at a time, with endoscopy/biopsy checks, to find which food(s) are your personal triggers — so you only avoid what you must.\n\nThis is best done with a dietitian, especially for children, to keep nutrition complete. Use the Track tab to log meals and suspected triggers.",
   "تزيل الحمية الأطعمة التي تغذّي الالتهاب. الطريقة الكلاسيكية تحذف ستة محفّزات شائعة — الحليب، القمح، البيض، الصويا، المكسّرات، والسمك/المحار («حمية حذف الأطعمة الستة»). يبدأ البعض أصغر (غذاء واحد أو أربعة) ويتدرّج عند الحاجة.\n\nبعد شفاء المريء في منظار المتابعة، تُعاد الأطعمة واحدًا تلو الآخر مع فحوص منظار/خزعة لتحديد محفّزك الشخصي — فتتجنّب ما يلزم فقط.\n\nيُفضّل ذلك مع أخصائي تغذية، خاصة للأطفال، للحفاظ على تغذية كاملة. استخدم تبويب التتبّع لتسجيل الوجبات والمحفّزات المشتبهة."]},
 {id:'tips',icon:'🍽️',cat:'living',min:3,t:['Eating tips & adaptations','نصائح الأكل والتأقلم'],body:[
   "Small habits make meals safer and calmer:\n\n• Cut food into small pieces and chew thoroughly.\n• Eat slowly and don’t rush; put utensils down between bites.\n• Keep water or a drink handy and sip to help food down.\n• Add sauces or moisture to dry foods.\n• Be careful with tough meat, dry bread, rice, and raw fibrous fruit/veg if these stick.\n• Take pills with plenty of water, sitting upright.\n\nLog which tactics you use in the Track tab — over time you’ll see what helps you most.",
   "عادات صغيرة تجعل الوجبات أأمن وأهدأ:\n\n• قطّع الطعام صغيرًا وامضغ جيدًا.\n• كُل ببطء ولا تتعجّل؛ ضَع الأدوات بين اللقمات.\n• أبقِ ماءً قريبًا وارتشف لتمرير الطعام.\n• أضِف صلصات أو رطوبة للأطعمة الجافة.\n• احذر اللحم القاسي والخبز الجاف والأرز والفواكه/الخضار الليفية النيئة إن كانت تنحشر.\n• تناول الحبوب بكثير من الماء وأنت جالس مستقيمًا.\n\nسجّل الحيل التي تستخدمها في تبويب التتبّع — ستلاحظ مع الوقت ما يفيدك أكثر."]},
 {id:'impaction',icon:'🚨',cat:'living',min:3,t:['Food impaction — what to do','انحشار الطعام — ماذا تفعل'],body:[
   "Food impaction means a piece of food is stuck and will not pass. It is the most common emergency in EoE.\n\nIf it happens:\n• Stay calm and stop eating.\n• Do not force more food or large drinks down.\n• Small sips of water may help; if it passes, you’re okay — but tell your doctor.\n• If the food will NOT pass, and especially if you cannot swallow your own saliva (drooling), or you have chest pain or trouble breathing — go to the emergency department now.\n\nNever try to push a stuck piece down with more food. Repeated impactions are a sign your EoE needs review.",
   "انحشار الطعام يعني علوق قطعة طعام دون أن تمرّ. وهو أكثر طارئ شيوعًا في المرض.\n\nإن حدث:\n• اهدأ وتوقّف عن الأكل.\n• لا تدفع مزيدًا من الطعام أو مشروبات كبيرة.\n• رشفات ماء صغيرة قد تساعد؛ إن مرّت فأنت بخير — لكن أخبر طبيبك.\n• إن لم يمرّ الطعام، خاصة إن لم تستطع بلع ريقك (سيلان لعاب)، أو لديك ألم صدر أو صعوبة تنفّس — اذهب للطوارئ الآن.\n\nلا تحاول دفع القطعة بمزيد من الطعام. تكرار الانحشار علامة أن مرضك يحتاج مراجعة."]},
 {id:'living',icon:'🌿',cat:'living',min:4,t:['Living well with EoE','التعايش الجيد مع المرض'],body:[
   "EoE is a marathon, not a sprint. A few things help you stay in control:\n\n• Keep taking treatment even when you feel well — symptoms can improve before the inflammation does.\n• Attend follow-up endoscopies; they show whether treatment is truly working at the tissue level.\n• Manage other allergies (asthma, eczema, rhinitis) with your team.\n• Track symptoms and triggers so visits are productive and decisions are based on your real pattern.\n• Look after mood and mealtime anxiety — eating stress is common and valid.\n\nShare a summary from this app with your doctor to support each visit.",
   "المرض ماراثون لا سباق قصير. أمور تساعدك على البقاء مسيطرًا:\n\n• استمر بالعلاج حتى عند الشعور بالتحسّن — قد تتحسّن الأعراض قبل الالتهاب.\n• احضر مناظير المتابعة؛ تُظهر إن كان العلاج فعّالًا نسيجيًا.\n• أدِر الحساسيات الأخرى (ربو، إكزيما، التهاب أنف) مع فريقك.\n• تابع الأعراض والمحفّزات لتكون الزيارات مثمرة والقرارات مبنية على نمطك الحقيقي.\n• اعتنِ بالمزاج وقلق الأكل — توتّر الطعام شائع ومفهوم.\n\nشارك ملخّصًا من التطبيق مع طبيبك لدعم كل زيارة."]},
 {id:'kids',icon:'🧒',cat:'basics',min:3,t:['EoE in children','المرض عند الأطفال'],body:[
   "In children EoE can look different. Babies and toddlers may refuse food, gag or vomit, have tummy pain, or gain weight slowly. Older children may say food gets stuck or simply become very slow, picky eaters.\n\nDiagnosis still needs endoscopy and biopsy. Treatment uses the same tools — PPIs, swallowed steroids, dupilumab (approved down to young ages by weight), and diet — always guided by a pediatric team and dietitian to protect growth.\n\nWatch for choking, drooling, or inability to swallow saliva, which need urgent care.",
   "عند الأطفال قد يبدو المرض مختلفًا. الرُّضّع والصغار قد يرفضون الطعام أو يتقيّؤون أو يعانون ألم بطن أو بطء اكتساب وزن. الأكبر قد يقولون إن الطعام ينحشر أو يصبحون بطيئين انتقائيين في الأكل.\n\nيظل التشخيص يحتاج منظارًا وخزعة. يستخدم العلاج الأدوات نفسها — مثبّطات المضخة، ستيرويدات مبلوعة، دوبيلوماب (معتمد لأعمار صغيرة حسب الوزن)، والحمية — دائمًا بإشراف فريق أطفال وأخصائي تغذية لحماية النمو.\n\nانتبه للاختناق أو سيلان اللعاب أو عدم القدرة على بلع الريق، فهي تحتاج رعاية عاجلة."]},
];

function deepMerge(b,o){if(b===null||typeof b!=='object'||Array.isArray(b))return o===undefined?b:o;const out=Object.assign({},b);if(o&&typeof o==='object'&&!Array.isArray(o)){for(const k in o){const x=b[k],y=o[k];out[k]=(x&&typeof x==='object'&&!Array.isArray(x)&&y&&typeof y==='object'&&!Array.isArray(y))?deepMerge(x,y):y;}}return out;}
function load(){try{const v=JSON.parse(localStorage.getItem(KEY));return v?deepMerge(blank(),v):blank();}catch(e){return blank();}}

/* ---------- date helpers ---------- */
function todayKey(d){d=d||new Date();return d.toISOString().slice(0,10);}
function daysAgo(k){return Math.round((Date.now()-new Date(k+'T00:00').getTime())/864e5);}
function lastNDays(n){const a=[];for(let i=n-1;i>=0;i--){const d=new Date();d.setDate(d.getDate()-i);a.push(todayKey(d));}return a;}
function fmtDate(iso){const d=new Date(iso);return d.toLocaleDateString(isAr()?'ar-SA':'en-GB',{day:'numeric',month:'short'});}
function fmtTime(iso){return new Date(iso).toLocaleTimeString(isAr()?'ar-SA':'en-GB',{hour:'2-digit',minute:'2-digit'});}
function streak(){let n=0;for(let i=0;i<400;i++){const d=new Date();d.setDate(d.getDate()-i);if(S.seenDays.includes(todayKey(d)))n++;else if(i>0)break;}return n;}
function markDay(){const k=todayKey();if(!S.seenDays.includes(k)){S.seenDays.push(k);save();}}

/* ---------- charts (inline SVG) ---------- */
function sparkline(vals,color,W,H){W=W||300;H=H||70;color=color||'var(--accent)';if(!vals.length)return '';const mx=Math.max(...vals,1),mn=Math.min(...vals,0);const X=i=>10+i*(W-20)/Math.max(vals.length-1,1);const Y=v=>H-12-(v-mn)/(mx-mn||1)*(H-24);const pts=vals.map((v,i)=>`${X(i).toFixed(1)},${Y(v).toFixed(1)}`).join(' ');const dots=vals.map((v,i)=>`<circle cx="${X(i).toFixed(1)}" cy="${Y(v).toFixed(1)}" r="2.4" fill="${color}"/>`).join('');return `<svg viewBox="0 0 ${W} ${H}" width="100%" preserveAspectRatio="xMidYMid meet"><polyline fill="none" stroke="${color}" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" points="${pts}"/>${dots}</svg>`;}
function barChart(vals,labels,color,ref){const W=320,H=120,n=vals.length;color=color||'var(--accent2)';const mx=Math.max(...vals,ref||0,1);const bw=(W-30)/n*.62;const X=i=>20+i*(W-30)/n+((W-30)/n-bw)/2;const Y=v=>H-20-v/mx*(H-34);let bars=vals.map((v,i)=>`<rect x="${X(i).toFixed(1)}" y="${Y(v).toFixed(1)}" width="${bw.toFixed(1)}" height="${(H-20-Y(v)).toFixed(1)}" rx="3" fill="${color}"/>`).join('');let rl='';if(ref){rl=`<line x1="20" y1="${Y(ref).toFixed(1)}" x2="${W-10}" y2="${Y(ref).toFixed(1)}" stroke="var(--bad)" stroke-width="1.4" stroke-dasharray="4 3"/><text x="${W-12}" y="${(Y(ref)-3).toFixed(1)}" text-anchor="end" font-size="9" fill="var(--bad)">${ref}</text>`;}const xl=labels?labels.map((l,i)=>`<text x="${(X(i)+bw/2).toFixed(1)}" y="${H-7}" text-anchor="middle" font-size="8" fill="var(--faint)">${l}</text>`).join(''):'';return `<svg viewBox="0 0 ${W} ${H}" width="100%" preserveAspectRatio="xMidYMid meet" font-family="inherit">${bars}${rl}${xl}</svg>`;}
function radar(vals,maxes,labels){const N=vals.length,cx=150,cy=140,R=92;const pt=(i,r)=>{const a=-Math.PI/2+i*2*Math.PI/N;return [cx+r*Math.cos(a),cy+r*Math.sin(a)];};let grid='';[.25,.5,.75,1].forEach(g=>{grid+=`<polygon points="${Array.from({length:N}).map((_,i)=>pt(i,R*g).join(',')).join(' ')}" fill="none" stroke="var(--line)" stroke-width="1"/>`;});let spokes='';for(let i=0;i<N;i++){const[x,y]=pt(i,R);spokes+=`<line x1="${cx}" y1="${cy}" x2="${x.toFixed(1)}" y2="${y.toFixed(1)}" stroke="var(--line)"/>`;}const poly=`<polygon points="${vals.map((v,i)=>pt(i,R*(v/(maxes[i]||1))).join(',')).join(' ')}" fill="var(--accent)" fill-opacity=".3" stroke="var(--accent)" stroke-width="2"/>`;const dots=vals.map((v,i)=>{const[x,y]=pt(i,R*(v/(maxes[i]||1)));return `<circle cx="${x.toFixed(1)}" cy="${y.toFixed(1)}" r="3" fill="var(--accent)"/>`;}).join('');const labs=labels.map((d,i)=>{const[x,y]=pt(i,R+16);return `<text x="${x.toFixed(1)}" y="${y.toFixed(1)}" font-size="9.5" fill="var(--muted)" text-anchor="middle">${d}</text>`;}).join('');return `<svg viewBox="0 0 300 280" width="100%" style="max-width:320px" font-family="inherit">${grid}${spokes}${poly}${dots}${labs}</svg>`;}
function heatmap(){const days=lastNDays(35);return `<div style="display:grid;grid-template-columns:repeat(7,1fr);gap:5px">${days.map(d=>{const c=S.logs.filter(l=>l.t.slice(0,10)===d).length;const lvl=c===0?0:c<2?1:c<4?2:3;const col=['var(--card2)','#3a2a55','#6d4aa8','var(--accent)'][lvl];return `<div title="${d}" style="aspect-ratio:1;border-radius:5px;background:${col};border:1px solid var(--line)"></div>`;}).join('')}</div>`;}

  <div class="li" style="border:none;padding:4px 2px"><div class="tx"><b>🔔 ${ar?'ذكّرني':'Remind me'}</b></div><button class="chip on" id="rg_rem" onclick="this.classList.toggle('on')">${ar?'مفعّل':'On'}</button></div>

window.saveRegimen=()=>{const ar=isAr();const name=($('#rg_name').value||'').trim();if(!name)return toast(ar?'أدخل اسم الدواء':'Enter a medication name');const freq=$('#rg_freq').dataset.val||'daily';const time=$('#rg_time').value||'09:00';const remind=$('#rg_rem').classList.contains('on');const r={id:rid(),name,dose:($('#rg_dose').value||'').trim(),freq,time,remind};S.regimen.push(r);
  if(remind)S.reminders.push({id:'rm_'+r.id,kind:'med',label:(ar?'دواء: ':'Medication: ')+name+(r.dose?' ('+r.dose+')':''),time,days:'daily',enabled:true});

route('reminders',(n)=>{const ar=isAr();const perm=(typeof Notification!=='undefined')?Notification.permission:'unsupported';
  n.innerHTML=`${topbar(null,null,{back:true,rawTitle:ar?'التذكيرات':'Reminders'})}<div class="content">
   ${perm==='granted'?`<div class="disc-note">${ar?'الإشعارات مفعّلة ✓ — ستصلك التنبيهات أثناء فتح معين.':'Notifications enabled ✓ — you\'ll get alerts while Maeen is open.'}</div>`:perm==='unsupported'?'':`<button class="btn btn-ghost" onclick="askNotif()">🔔 ${ar?'تفعيل الإشعارات':'Enable notifications'}</button>`}
   <button class="btn btn-primary" onclick="openReminder()">＋ ${ar?'تذكير جديد':'New reminder'}</button>
   ${S.reminders.length?`<div class="card">${S.reminders.map(r=>{const k=RKINDS.find(x=>x[0]===r.kind)||['','🔔',['','']];return `<div class="li"><div class="ic">${k[1]}</div><div class="tx"><b>${esc(r.label)}</b><small>${r.time} · ${r.days==='daily'?(ar?'كل يوم':'Every day'):r.days}</small></div><button class="chip ${r.enabled?'on':''}" onclick="toggleReminder('${r.id}')">${r.enabled?(ar?'مفعّل':'On'):(ar?'موقف':'Off')}</button><button class="iconbtn" style="margin-inline-start:6px;min-width:34px;height:34px;font-size:14px" onclick="icsReminder('${r.id}')">📅</button><button class="iconbtn" style="margin-inline-start:6px;min-width:34px;height:34px;font-size:14px" onclick="delReminder('${r.id}')">✕</button></div>`;}).join('')}</div>`:`<div class="card center" style="padding:26px">${emptyArt()}<p class="muted">${ar?'لا تذكيرات بعد.':'No reminders yet.'}</p></div>`}
   <div class="disc-note">${ar?'تعمل التذكيرات داخل التطبيق أثناء فتحه. للتنبيه الموثوق على هاتفك، اضغط 📅 لإضافة التذكير لتقويمك.':'In-app reminders fire while Maeen is open. For a reliable phone alert, tap 📅 to add the reminder to your calendar.'}</div>
  </div>`;});
window.askNotif=()=>{if(typeof Notification==='undefined')return;Notification.requestPermission().then(()=>{startReminderTick();render();});};
window.openReminder=()=>{const ar=isAr();openSheet(`<h2 style="margin:4px 0 12px">🔔 ${ar?'تذكير جديد':'New reminder'}</h2>
  <div class="field"><label>${ar?'النوع':'Type'}</label><div class="chips" id="rm_kind">${RKINDS.map(k=>`<button class="chip" data-v="${k[0]}" data-lb="${esc(L(k[2]))}" onclick="pick('rm_kind',this);document.getElementById('rm_lb').value=this.getAttribute('data-lb')">${k[1]} ${L(k[2])}</button>`).join('')}</div></div>
  <div class="field"><label>${ar?'النص':'Label'}</label><input class="input" id="rm_lb" placeholder="${ar?'مثال: تسجيل أعراض المساء':'e.g. Evening symptom check'}"></div>
  <div class="grid2" style="display:grid;grid-template-columns:1fr 1fr;gap:11px"><div class="field"><label>${ar?'الوقت':'Time'}</label><input class="input" id="rm_time" type="time" value="20:00"></div>
  <div class="field"><label>${ar?'التكرار':'Repeat'}</label><div class="chips" id="rm_days">${[['daily',ar?'كل يوم':'Every day'],['weekdays',ar?'أيام العمل':'Weekdays']].map(([v,l])=>`<button class="chip ${v==='daily'?'on':''}" data-v="${v}" onclick="pick('rm_days',this)">${l}</button>`).join('')}</div></div></div>
  <button class="btn btn-primary" onclick="saveReminder()">${t('save')}</button>`);$('#rm_days').dataset.val='daily';};
window.saveReminder=()=>{const ar=isAr();const kind=$('#rm_kind').dataset.val||'med';const label=($('#rm_lb').value||'').trim()||(RKINDS.find(k=>k[0]===kind)?L(RKINDS.find(k=>k[0]===kind)[2]):'Reminder');const time=$('#rm_time').value||'20:00';const days=$('#rm_days').dataset.val||'daily';S.reminders.push({id:rid(),kind,label,time,days,enabled:true});save();closeSheet();if(typeof Notification!=='undefined'&&Notification.permission==='default')askNotif();else startReminderTick();toast(t('saved'));render();};
window.toggleReminder=(id)=>{const r=S.reminders.find(x=>x.id===id);if(r){r.enabled=!r.enabled;save();render();}};
window.delReminder=(id)=>{S.reminders=S.reminders.filter(x=>x.id!==id);save();render();};
window.icsReminder=(id)=>{const r=S.reminders.find(x=>x.id===id);if(!r)return;const [hh,mm]=r.time.split(':');const dt=new Date();dt.setHours(+hh,+mm,0,0);if(dt<new Date())dt.setDate(dt.getDate()+1);const pad=x=>String(x).padStart(2,'0');const stamp=d=>d.getUTCFullYear()+pad(d.getUTCMonth()+1)+pad(d.getUTCDate())+'T'+pad(d.getUTCHours())+pad(d.getUTCMinutes())+'00Z';const rule=r.days==='weekdays'?'FREQ=WEEKLY;BYDAY=MO,TU,WE,TH,FR':'FREQ=DAILY';
  const ics=['BEGIN:VCALENDAR','VERSION:2.0','PRODID:-//Maeen//EN','BEGIN:VEVENT','UID:'+r.id+'@maeen','DTSTAMP:'+stamp(new Date()),'DTSTART:'+stamp(dt),'RRULE:'+rule,'SUMMARY:Maeen — '+r.label,'BEGIN:VALARM','TRIGGER:PT0M','ACTION:DISPLAY','DESCRIPTION:'+r.label,'END:VALARM','END:VEVENT','END:VCALENDAR'].join('\r\n');
  const blob=new Blob([ics],{type:'text/calendar'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='maeen-reminder.ics';a.click();toast(isAr()?'أُضيف للتقويم':'Added to calendar');};
let _rtick=null,_fired={};
function startReminderTick(){if(_rtick||typeof Notification==='undefined')return;_rtick=setInterval(()=>{if(Notification.permission!=='granted')return;const now=new Date();const hm=String(now.getHours()).padStart(2,'0')+':'+String(now.getMinutes()).padStart(2,'0');const dow=now.getDay();const key=todayKey()+hm;
   S.reminders.forEach(r=>{if(!r.enabled||r.time!==hm)return;if(r.days==='weekdays'&&(dow===5||dow===6))return;if(_fired[r.id]===key)return;_fired[r.id]=key;try{new Notification('Maeen · معين',{body:r.label,icon:'maeen-192.png'});}catch(e){}});},30000);}

/* ============================================================ WELLNESS & HABITS ============================================================ */
function ring(pct,color,label,sub){color=color||'var(--accent)';const R=52,C=2*Math.PI*R,off=C*(1-Math.max(0,Math.min(100,pct))/100);return `<svg viewBox="0 0 140 140" width="100%" style="max-width:140px"><circle cx="70" cy="70" r="${R}" fill="none" stroke="var(--card2)" stroke-width="12"/><circle cx="70" cy="70" r="${R}" fill="none" stroke="${color}" stroke-width="12" stroke-linecap="round" stroke-dasharray="${C.toFixed(1)}" stroke-dashoffset="${off.toFixed(1)}" transform="rotate(-90 70 70)"/><text x="70" y="66" text-anchor="middle" font-size="26" font-weight="800" fill="var(--txt)" font-family="inherit">${label}</text><text x="70" y="88" text-anchor="middle" font-size="10" fill="var(--muted)" font-family="inherit">${sub||''}</text></svg>`;}
const TIPS=[
 ['Cut food into small pieces and chew thoroughly.','قطّع الطعام صغيرًا وامضغ جيدًا.'],
 ['Eat slowly and put utensils down between bites.','كُل ببطء وضع الأدوات بين اللقمات.'],
 ['Keep a drink handy and sip to help food down.','أبقِ مشروبًا قريبًا وارتشف لتمرير الطعام.'],
 ['After swallowed steroids, avoid food and drink for ~30 minutes.','بعد الستيرويد المبلوع، تجنّب الأكل والشرب نحو ٣٠ دقيقة.'],
 ['Add sauces or moisture to dry foods.','أضِف صلصات أو رطوبة للأطعمة الجافة.'],
 ['Keep taking treatment even when you feel well.','استمر بالعلاج حتى عند شعورك بالتحسّن.'],
 ['Attend follow-up endoscopies — they show tissue healing.','احضر مناظير المتابعة — تُظهر شفاء النسيج.'],
 ['If food is stuck and you cannot swallow saliva, seek urgent care.','إن انحشر الطعام ولم تستطع بلع ريقك، اطلب رعاية عاجلة.'],
 ['Note which foods feel harder to swallow.','دوّن الأطعمة الأصعب في البلع.'],
 ['Manage other allergies (asthma, eczema) with your team.','أدِر الحساسيات الأخرى (ربو، إكزيما) مع فريقك.'],
 ['Mealtime anxiety is common — slow, calm eating helps.','قلق الأكل شائع — الأكل البطيء الهادئ يساعد.'],
 ['Stay hydrated steadily through the day.','حافظ على ترطيبك بثبات طوال اليوم.']
];
function tipIndex(){const d=new Date();return Math.floor((d-new Date(d.getFullYear(),0,0))/864e5)%TIPS.length;}
window.openTip=()=>openTipN(tipIndex());
window.openTipN=(i)=>{const ar=isAr();openSheet(`<div style="text-align:center;font-size:38px">💡</div><h2 style="text-align:center;margin:6px 0 4px">${ar?'نصيحة اليوم':'Tip of the day'}</h2><p style="text-align:center;font-size:16px;line-height:1.7;margin:10px 6px 16px">${L(TIPS[i])}</p><button class="btn btn-ghost" onclick="openTipN(${(i+1)%TIPS.length})">${ar?'نصيحة أخرى':'Another tip'} →</button>`);};

const WGOAL=2000;
function waterToday(){const k=todayKey();return S.water.filter(x=>x.date===k).reduce((a,b)=>a+b.ml,0);}
window.addWater=(ml)=>{S.water.push({date:todayKey(),ml});save();render();};
window.undoWater=()=>{const k=todayKey();for(let i=S.water.length-1;i>=0;i--){if(S.water[i].date===k){S.water.splice(i,1);break;}}save();render();};
route('water',(n)=>{const ar=isAr();const c=waterToday();const pct=Math.min(100,Math.round(c/WGOAL*100));const days=lastNDays(7);const vals=days.map(d=>S.water.filter(x=>x.date===d).reduce((a,b)=>a+b.ml,0));
  n.innerHTML=`${topbar(null,null,{back:true,rawTitle:ar?'الماء':'Hydration'})}<div class="content">
   <div class="card center">${ring(pct,'var(--accent2)',pct+'%',c+' / '+WGOAL+' ml')}<div class="muted" style="font-size:13px;margin-top:4px">${Math.round(c/250)} ${ar?'كوب اليوم (٢٥٠مل)':'cups today (250ml)'}</div></div>
   <div class="grid3" style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:9px"><button class="btn btn-ghost" onclick="addWater(250)">＋ ${ar?'كوب':'Cup'}</button><button class="btn btn-ghost" onclick="addWater(500)">＋ ٥٠٠</button><button class="btn btn-ghost" onclick="undoWater()">↺</button></div>
   <div class="card"><div class="section-title" style="margin:0 0 6px">${ar?'آخر ٧ أيام':'Last 7 days'}</div>${barChart(vals,days.map(d=>fmtDate(d+'T00:00')),'var(--accent2)',WGOAL)}</div>
   <div class="disc-note">${ar?'الترطيب الجيّد يساعد على تمرير الطعام ويقلّل شعور الالتصاق. ارتشف بثبات.':'Good hydration helps food go down and reduces the stuck feeling. Sip steadily.'}</div>
  </div>`;});

let _mealTimer=null,_mealLeft=0;
route('mindful',(n)=>{const ar=isAr();n.innerHTML=`${topbar(null,null,{back:true,rawTitle:ar?'الأكل الواعي':'Mindful eating'})}<div class="content">
   <div class="disc-note">${ar?'الأكل البطيء والمضغ الجيّد أساس في التهاب المريء اليوزيني — يقلّلان خطر انحشار الطعام. استهدف نحو ٢٠ دقيقة لكل وجبة.':'Slow eating and thorough chewing are central in EoE — they lower the risk of food impaction. Aim for about 20 minutes per meal.'}</div>
   <div class="card center"><div id="mmDisp" style="font-size:52px;font-weight:800;letter-spacing:-2px;color:var(--accent)">20:00</div>
     <div id="mmCue" style="font-size:14px;color:var(--muted);margin-top:4px;min-height:20px">${ar?'اضغط ابدأ':'Press start'}</div>
     <div class="grid2" style="display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-top:14px"><button class="btn btn-primary" id="mmBtn" onclick="mealTimer()">${ar?'ابدأ':'Start'}</button><button class="btn btn-ghost" onclick="mealReset()">${ar?'إعادة':'Reset'}</button></div>
   </div></div>`;updateMeal();});
function fmtMMSS(s){const m=Math.floor(s/60),ss=s%60;return m+':'+String(ss).padStart(2,'0');}
function updateMeal(){const d=$('#mmDisp');if(d)d.textContent=fmtMMSS(_mealLeft||1200);}
window.mealTimer=()=>{const ar=isAr();if(_mealTimer){clearInterval(_mealTimer);_mealTimer=null;const b=$('#mmBtn');if(b)b.textContent=ar?'متابعة':'Resume';return;}if(!_mealLeft)_mealLeft=1200;const b=$('#mmBtn');if(b)b.textContent=ar?'إيقاف':'Pause';
  _mealTimer=setInterval(()=>{_mealLeft--;const d=$('#mmDisp');if(d)d.textContent=fmtMMSS(Math.max(0,_mealLeft));const cue=$('#mmCue');if(cue&&_mealLeft%30===0&&_mealLeft>0){cue.textContent=ar?'🍽️ لقمة صغيرة · امضغ جيدًا · تنفّس':'🍽️ Small bite · chew well · breathe';cue.style.color='var(--accent)';setTimeout(()=>{if(cue)cue.style.color='var(--muted)';},1200);}if(_mealLeft<=0){clearInterval(_mealTimer);_mealTimer=null;if(d)d.textContent='✓';if(cue)cue.textContent=ar?'أحسنت — وجبة واعية':'Well done — a mindful meal';}},1000);};
window.mealReset=()=>{if(_mealTimer){clearInterval(_mealTimer);_mealTimer=null;}_mealLeft=1200;const b=$('#mmBtn');if(b)b.textContent=isAr()?'ابدأ':'Start';const c=$('#mmCue');if(c)c.textContent=isAr()?'اضغط ابدأ':'Press start';updateMeal();};

const COURSES=[
 {id:'living',icon:'🍽️',color:'var(--accent)',t:['Living with EoE','التعايش مع التهاب المريء اليوزيني'],sub:['8 days to understand & manage EoE','٨ أيام لفهم المرض وإدارته'],days:[
  {t:['What EoE is','ما هو التهاب المريء اليوزيني'],b:['Eosinophilic esophagitis is a chronic allergic condition where eosinophils build up in the esophagus, making it stiff and narrow so food can slow or stick. It’s managed long-term, not cured — and with the right care most people swallow comfortably again.','التهاب المريء اليوزيني حالة تحسّسية مزمنة تتراكم فيها الحمضات في المريء فيصبح متيبّسًا وضيّقًا فيبطؤ الطعام أو ينحشر. يُدار طويلًا ولا يُشفى تمامًا — ومع الرعاية المناسبة يعود معظم الناس للبلع بارتياح.']},
  {t:['Recognising symptoms','التعرّف على الأعراض'],b:['The main symptom in adults is dysphagia — food feeling slow or stuck. Many adapt without realising: cutting food small, chewing a lot, drinking to wash food down. Noticing your patterns makes clinic visits far more useful.','أكثر عَرَض شيوعًا لدى البالغين هو عُسر البلع — إحساس ببطء الطعام أو انحشاره. يتأقلم كثيرون دون أن يدركوا: تقطيع صغير، مضغ كثير، شرب لتمرير الطعام. ملاحظة أنماطك تجعل زيارات العيادة أنفع بكثير.']},
  {t:['Food impaction: the emergency','انحشار الطعام: الحالة الطارئة'],b:['If food is stuck and won’t pass — especially if you cannot swallow your own saliva, or you have chest pain or trouble breathing — seek urgent care now. Never try to push a stuck piece down with more food.','إذا انحشر الطعام ولم يمرّ — خاصة إن لم تستطع بلع ريقك، أو لديك ألم صدر أو صعوبة تنفّس — اطلب رعاية عاجلة الآن. لا تحاول أبدًا دفع القطعة العالقة بمزيد من الطعام.']},
  {t:['Eating tactics','حِيَل الأكل'],b:['Cut food into small pieces, chew thoroughly, eat slowly, sip drinks to help food down, add sauces to dry foods, and be careful with tough meat, dry bread and rice. Small habits make every meal calmer and safer.','قطّع الطعام صغيرًا، وامضغ جيدًا، وكُل ببطء، وارتشف لتمرير الطعام، وأضِف صلصات للأطعمة الجافة، واحذر اللحم القاسي والخبز الجاف والأرز. عادات صغيرة تجعل كل وجبة أهدأ وأأمن.']},
  {t:['The 3 D’s of treatment','العلاجات الثلاثة'],b:['Treatment rests on Drugs (PPIs, swallowed steroids, dupilumab), Diet (removing trigger foods), and Dilation (gently stretching a narrowing). Your doctor tailors the mix to your case — all three aim to calm inflammation and keep you swallowing.','يقوم العلاج على الدواء (مثبّطات المضخة، الستيرويدات المبلوعة، دوبيلوماب)، والحمية (إزالة المحفّزات)، والتوسيع (توسيع لطيف للتضيّق). يخصّص طبيبك المزيج لحالتك — وكلها تهدف لتهدئة الالتهاب وإبقائك تبلع.']},
  {t:['Taking medication well','تناول الدواء جيدًا'],b:['Swallowed steroids coat the esophagus: take them as directed, then have no food or drink for about 30 minutes, and rinse your mouth. Keep treatment going even when you feel well — symptoms often improve before the inflammation does.','الستيرويدات المبلوعة تغلّف المريء: تناولها حسب التعليمات، ثم لا طعام ولا شراب نحو ٣٠ دقيقة، واشطف فمك. استمر بالعلاج حتى عند شعورك بالتحسّن — فالأعراض تتحسّن غالبًا قبل الالتهاب.']},
  {t:['Tracking your scores','متابعة درجاتك'],b:['Recording your EEsAI symptom index, EREFS endoscopy score and biopsy eosinophil count over time shows whether treatment is truly working at the tissue level. Bring a summary from the app to every visit.','تسجيل مؤشّر أعراض EEsAI ودرجة منظار EREFS وعدد الحمضات في الخزعة عبر الوقت يُظهر إن كان العلاج فعّالًا نسيجيًا. أحضِر ملخّصًا من التطبيق لكل زيارة.']},
  {t:['Living well','التعايش الجيّد'],b:['EoE is a marathon, not a sprint. Attend follow-up endoscopies, manage other allergies, look after mealtime anxiety, and stay connected to your team. You’re building lifelong skills — keep going.','المرض ماراثون لا سباق قصير. احضر مناظير المتابعة، وأدِر الحساسيات الأخرى، واعتنِ بقلق الأكل، وابقَ على تواصل مع فريقك. أنت تبني مهارات مدى الحياة — واصل.']}
 ]},
 {id:'elim',icon:'🥗',color:'var(--accent2)',t:['Elimination diet & reintroduction','حمية الإقصاء وإعادة الإدخال'],sub:['6 days on diet therapy','٦ أيام عن الحمية العلاجية'],days:[
  {t:['How diet therapy works','كيف تعمل الحمية العلاجية'],b:['Removing foods that drive inflammation can calm EoE. The classic six-food elimination removes milk, wheat, egg, soy, nuts and fish/shellfish; some start smaller and step up. It’s best done with a dietitian to keep nutrition complete.','إزالة الأطعمة التي تغذّي الالتهاب قد تهدّئ المرض. تحذف حمية الأطعمة الستة الكلاسيكية الحليب والقمح والبيض والصويا والمكسّرات والسمك/المحار؛ ويبدأ البعض أصغر ويتدرّج. يُفضّل مع أخصائي تغذية للحفاظ على تغذية كاملة.']},
  {t:['Starting elimination','بدء الإقصاء'],b:['Choose your approach with your team, read food labels carefully, and plan meals so nutrition stays complete — especially important for children. Log your meals in the app as you go.','اختر أسلوبك مع فريقك، واقرأ ملصقات الأطعمة بعناية، وخطّط الوجبات لتبقى التغذية كاملة — وهو مهم خصوصًا للأطفال. سجّل وجباتك في التطبيق أثناء ذلك.']},
  {t:['The healing check','فحص الشفاء'],b:['After weeks on the diet, a repeat endoscopy and biopsy check whether the esophagus has healed. Symptoms alone aren’t enough — the tissue tells the real story of whether it’s working.','بعد أسابيع على الحمية، يتحقّق منظار وخزعة المتابعة من شفاء المريء. الأعراض وحدها لا تكفي — النسيج يروي الحقيقة عن نجاحها.']},
  {t:['Reintroducing foods','إعادة إدخال الأطعمة'],b:['Foods are added back one at a time, with endoscopy/biopsy checks, to find which are your personal triggers — so you end up avoiding only what you truly must.','تُعاد الأطعمة واحدًا تلو الآخر مع فحوص منظار/خزعة لتحديد محفّزاتك الشخصية — فتتجنّب في النهاية ما يلزم فعلًا فقط.']},
  {t:['Finding your triggers','تحديد محفّزاتك'],b:['Milk is the most common single trigger. Use the app’s trigger finder to spot patterns between logged foods and symptoms — then confirm them with your team through testing, not by guessing.','الحليب أشيع محفّز مفرد. استخدم محلّل المحفّزات في التطبيق لرصد الأنماط بين الأطعمة المسجّلة والأعراض — ثم أكّدها مع فريقك عبر الفحص لا بالتخمين.']},
  {t:['Sustaining it','الاستدامة'],b:['Once your triggers are known, keep the smallest effective set of restrictions, stay well-nourished, and re-check with your team over time. Diet therapy is a long-term partnership, not a one-off.','بمجرد معرفة محفّزاتك، أبقِ أقل مجموعة قيود فعّالة، وحافظ على تغذية جيّدة، وأعِد الفحص مع فريقك دوريًا. الحمية العلاجية شراكة طويلة الأمد لا حدثًا لمرة واحدة.']}
 ]}
];
function courseById(id){return COURSES.find(c=>c.id===id);}
function cDone(id){return (S.courses[id]&&S.courses[id].done)||[];}
function cNext(id){const c=courseById(id);const done=cDone(id);for(let i=0;i<c.days.length;i++)if(!done.includes(i))return i;return c.days.length-1;}
route('courses',(n)=>{const ar=isAr();n.innerHTML=`${topbar(null,null,{back:true,rawTitle:ar?'البرامج':'Courses',rawSub:ar?'دروس يومية قصيرة':'short daily lessons'})}<div class="content">
   ${COURSES.map(c=>{const done=cDone(c.id).length,tot=c.days.length,pct=Math.round(done/tot*100);return `<div class="card tap" onclick="go('course',{id:'${c.id}'})"><div class="row" style="gap:13px"><div style="width:46px;height:46px;border-radius:13px;background:color-mix(in srgb,${c.color} 18%,transparent);display:flex;align-items:center;justify-content:center;font-size:24px;flex:none">${c.icon}</div><div style="flex:1;min-width:0"><b style="font-size:15px">${L(c.t)}</b><div class="muted" style="font-size:12.5px">${L(c.sub)}</div><div class="pbar" style="margin-top:8px"><i style="width:${pct}%"></i></div><div class="muted" style="font-size:11.5px;margin-top:5px">${done}/${tot} ${ar?'يوم':'days'} · ${done===0?(ar?'ابدأ':'Start'):done>=tot?(ar?'اكتمل ✓':'Complete ✓'):(ar?'متابعة':'Continue')}</div></div><div class="chev">${ar?'‹':'›'}</div></div></div>`;}).join('')}
   <div class="disc-note">${ar?'محتوى تثقيفي عام — ليس نصيحة طبية فردية. قرارات العلاج مع فريقك.':'General education — not individual medical advice. Treatment decisions are made with your team.'}</div>
  </div>`;});
route('course',(n,o)=>{const ar=isAr();const c=courseById((o&&o.id)||(CURRENT_OPTS&&CURRENT_OPTS.id));if(!c)return go('courses');const done=cDone(c.id);const nx=cNext(c.id);
  n.innerHTML=`${topbar(null,null,{back:true,rawTitle:L(c.t)})}<div class="content">
   <div class="card"><div class="row" style="gap:13px"><div style="font-size:34px">${c.icon}</div><div><b style="font-size:16px">${L(c.t)}</b><div class="muted" style="font-size:12.5px">${L(c.sub)}</div></div></div><div class="pbar" style="margin-top:12px"><i style="width:${Math.round(done.length/c.days.length*100)}%"></i></div><div class="muted" style="font-size:12px;margin-top:6px">${done.length}/${c.days.length} ${ar?'مكتمل':'completed'}</div></div>
   <button class="btn btn-primary" onclick="go('lesson',{id:'${c.id}',day:${nx}})">${done.length===0?(ar?'ابدأ اليوم ١':'Start day 1'):done.length>=c.days.length?(ar?'راجع الدروس':'Review lessons'):(ar?'متابعة · اليوم ':'Continue · Day ')+(nx+1)}</button>
   <div class="card">${c.days.map((d,i)=>{const isDone=done.includes(i);return `<div class="li" style="cursor:pointer" onclick="go('lesson',{id:'${c.id}',day:${i}})"><div class="ic" style="background:${isDone?c.color:'var(--card2)'};color:${isDone?'#fff':'var(--muted)'};font-weight:800">${isDone?'✓':(i+1)}</div><div class="tx"><b style="font-weight:600">${L(d.t)}</b><small>${ar?'اليوم':'Day'} ${i+1}</small></div><div class="chev">${ar?'‹':'›'}</div></div>`;}).join('')}</div>
  </div>`;});
route('lesson',(n,o)=>{const ar=isAr();const oo=o&&o.id?o:(CURRENT_OPTS||{});const c=courseById(oo.id);if(!c)return go('courses');const i=oo.day||0;const d=c.days[i];const done=cDone(c.id).includes(i);const last=i>=c.days.length-1;
  n.innerHTML=`${topbar(null,null,{back:true,rawTitle:(ar?'اليوم ':'Day ')+(i+1)+'/'+c.days.length})}<div class="content">
   <div class="card"><div class="row" style="gap:10px;margin-bottom:10px"><div style="width:38px;height:38px;border-radius:11px;background:color-mix(in srgb,${c.color} 18%,transparent);display:flex;align-items:center;justify-content:center;font-size:20px">${c.icon}</div><div><div class="muted" style="font-size:11.5px">${L(c.t)}</div><b style="font-size:17px;letter-spacing:-.3px">${L(d.t)}</b></div></div><p style="font-size:15.5px;line-height:1.85;margin:0">${L(d.b)}</p></div>
   <button class="btn ${done?'btn-ghost':'btn-primary'}" onclick="toggleLesson('${c.id}',${i})">${done?(ar?'✓ مكتمل — إلغاء':'✓ Completed — undo'):(ar?'وضع علامة مكتمل':'Mark complete')}</button>
   <div class="grid2" style="display:grid;grid-template-columns:1fr 1fr;gap:9px">${i>0?`<button class="btn btn-ghost" onclick="go('lesson',{id:'${c.id}',day:${i-1}})">${ar?'› السابق':'‹ Previous'}</button>`:'<div></div>'}${!last?`<button class="btn btn-ghost" onclick="go('lesson',{id:'${c.id}',day:${i+1}})">${ar?'التالي ‹':'Next ›'}</button>`:`<button class="btn btn-ghost" onclick="go('course',{id:'${c.id}'})">${ar?'نظرة عامة':'Overview'}</button>`}</div>
  </div>`;});
window.toggleLesson=(id,day)=>{const st=S.courses[id]||{done:[]};const k=st.done.indexOf(day);if(k<0){st.done.push(day);toast(isAr()?'🎉 أحسنت':'🎉 Nice!');}else st.done.splice(k,1);S.courses[id]=st;save();const c=courseById(id);if(k<0&&day<c.days.length-1)go('lesson',{id,day:day+1});else render();};

/* ---------- boot ---------- */
window.navTab=navTab;window.go=go;window.goBack=goBack;window.closeSheet=closeSheet;
applyDir();
if(typeof Notification!=='undefined'&&Notification.permission==='granted')startReminderTick();
go('splash',{replace:true});
</script>
</body>
</html>
